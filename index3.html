    }
    if(item.family === 'beam'){
      applyDamage(target, stats.damage, {});
      state.effects.push({type:'muzzle', x:t.x, y:t.y-8, r:13, life:0.10, color:item.color});
      state.effects.push({type:'beam', x1:t.x, y1:t.y-8, x2:target.x, y2:target.y, life:0.14, color:item.color});
      state.effects.push({type:'impactFlash', x:target.x, y:target.y, r:8, life:0.10, color:item.color});
      return;
    }
    if(item.family === 'chain'){
      const victims = [target]; let pivot = target;
      for(let i=0;i<stats.chain;i++){
        let next = null, bestDist = 999999;
        for(const e of state.enemies){ if(victims.includes(e)) continue; const d = Math.hypot(e.x-pivot.x,e.y-pivot.y); if(d < 76 && d < bestDist){bestDist=d; next=e;} }
        if(next){ victims.push(next); pivot = next; }
      }
      for(const v of victims) applyDamage(v, stats.damage, {slow:item.key === 'shock' ? 0.86 : 0, slowTime:0.5});
      state.effects.push({type:'muzzle', x:t.x, y:t.y-8, r:11, life:0.09, color:item.color});
      state.effects.push({type:'chain', points:victims.map(v=>({x:v.x,y:v.y})), x1:t.x, y1:t.y-8, life:0.14, color:item.color});
      return;
    }

    const shots = stats.shots || 1;
    for(let s=0; s<shots; s++){
      const spread = shots > 1 ? (s - (shots-1)/2) * (stats.spreadArc || 0.10) : 0;
      const angle = Math.atan2(target.y - t.y, target.x - t.x) + spread;
      state.bullets.push({x:t.x, y:t.y-8, vx:Math.cos(angle)*stats.bulletSpeed, vy:Math.sin(angle)*stats.bulletSpeed, damage:stats.damage, splash:item.family === 'splash' ? stats.splash : 0, poison:stats.poison || 0, slow:stats.slow || 0, slowTime:stats.slowTime || 1.6, color:item.color, life:1.2});
      state.effects.push({type:'muzzle', x:t.x + Math.cos(angle) * 4, y:t.y - 8 + Math.sin(angle) * 4, r:item.family === 'splash' ? 9 : 6, life:0.08, color:item.color});
    }
  }

  function bossBehaviors(dt){
    for(const e of state.enemies){
      if(e.regen){ e.hp = Math.min(e.maxHp, e.hp + e.regen * dt); }
      if(e.enragedAt && e.hp < e.maxHp * e.enragedAt){ e.speed = Math.max(e.speed, e.boss ? 32 : 24); }
      if(e.rage && e.hp < e.maxHp * 0.5){ e.speed = Math.max(e.speed, 28); }
      if(e.towerSlowAura){ for(const t of state.turrets){ if(Math.hypot(t.x-e.x, t.y-e.y) < 96){ t.cooldown += dt * e.towerSlowAura; } } }
      if(e.chillAura){ for(const t of state.turrets){ if(Math.hypot(t.x-e.x, t.y-e.y) < 105){ t.cooldown += dt * 0.2; } } }
      if(e.summonEvery){ e.summonTimer -= dt; if(e.summonTimer <= 0){ e.summonTimer = e.summonEvery; const id = Math.floor(Math.random() * Math.min(MONSTERS.length, 20 + state.wave)); spawnEnemyFromTemplate(MONSTERS[id], false); } }
    }
  }

  function enemyRanged(dt, e){
    if(!e.ranged) return;
    e.spitCooldown -= dt; if(e.spitCooldown > 0) return;
    let target = null, best = 999999;
    for(const t of state.turrets){ const d = Math.hypot(t.x-e.x, t.y-e.y); if(d < e.spitRange && d < best){ target = t; best = d; } }
    if(!target) return;
    e.spitCooldown = e.spitRate;
    state.effects.push({type:'spit', x1:e.x, y1:e.y, x2:target.x, y2:target.y, life:0.14});
    target.hp -= e.spitDamage * (e.boss ? 1.35 : 1);
    if(e.curseRate) target.cooldown += e.curseRate;
    if(target.hp <= 0){
      const idx = state.turrets.findIndex(v => v.id === target.id); if(idx >= 0) state.turrets.splice(idx,1);
      state.supportDirty = true;
      if(state.selectedTurretId === target.id){ state.selectedTurretId = null; refreshActionBar(); }
      state.effects.push({type:'boom', x:target.x, y:target.y, r:18, life:0.18});
    } else if(state.selectedTurretId === target.id){
      refreshActionBar();
    }
  }

  function placeDeathPool(e){ if(e.deathPoison){ state.pools.push({x:e.x, y:e.y, r:42 + (e.boss ? 12 : 0), dps:e.deathPoison, life:2.8, color:'rgba(120,255,160,0.16)'}); } }

  function splitEnemy(e){
    if(!e.split) return;
    const spawns = Math.min(2, e.split);
    for(let i=0;i<spawns;i++){
      const template = MONSTERS.find(m => m.family === 'runner') || MONSTERS[0];
      const child = { ...template, baseHp: Math.max(12, template.baseHp - 6), hpInc: template.hpInc, speed: template.speed + 8, speedInc: template.speedInc, reward: Math.max(1, Math.floor(e.reward * 0.25)), size: Math.max(10, e.size * 0.65), color:e.accent || template.color };
      spawnEnemyFromTemplate(child, false);
      const ne = state.enemies[state.enemies.length - 1]; if(ne){ ne.x = e.x + (i===0?-8:8); ne.y = e.y - 4; ne.col = e.col; }
    }
  }


function damageBase(rawDamage, col){
  let damage = rawDamage;
  const maxEnergy = energyMaxValue();
  if(hasPassive('barrier_valve') && state.energy >= maxEnergy * 0.75) damage *= 0.75;
  damage = Math.max(1, damage - baseDamageFlatReduction());
  if(hasPassive('emergency_bulkhead') && !state.emergencyUsed && state.energy - damage <= 0){
    state.emergencyUsed = true;
    state.energy = 15;
    showBanner('EMERGENCY BULKHEAD', 1.5);
  } else {
    state.energy -= damage;
  }
  state.energyLossBank += damage;
  if(hasPassive('revenge_core')){
    while(state.energyLossBank >= 12){
      state.energyLossBank -= 12;
      addDamageBuff(1.22, 8, 'REVENGE CORE');
    }
  }
  if(hasPassive('shock_fence')){
    let hits = 0;
    for(const e of state.enemies){
      if(e.y < state.field.baseY - state.field.tileH * 2.2) continue;
      if(Math.abs(e.col - col) > 1) continue;
      applyDamage(e, 28, {slow:0.88, slowTime:0.4});
      hits += 1;
      if(hits >= 3) break;
    }
    if(hits) state.effects.push({type:'boom', x: state.field.left + (col + 0.5) * state.field.tileW, y: state.field.baseY - 10, r:20, life:0.16});
  }
  if(hasPassive('frost_fence')){
    for(const e of state.enemies){
      if(e.y < state.field.baseY - state.field.tileH * 2.0) continue;
      if(Math.abs(e.col - col) > 1) continue;
      e.slow = Math.min(e.slow, 0.55);
      e.slowTime = Math.max(e.slowTime, 2.0);
    }
    state.effects.push({type:'frost', x: state.field.left + (col + 0.5) * state.field.tileW, y: state.field.baseY - 8, r:26, life:0.22});
  }
  clampEnergy();
  updateHud();
  if(state.energy <= 0 && !state.over){ state.energy = 0; state.over = true; syncStartToggleButton(); persistUserStats(); showBanner('ENERGY ZERO - 리셋으로 다시 시작', 4); }
}

function onEnemyKilled(e){
  state.gold += e.reward + Math.floor(state.wave * 0.35);
  if(e.boss) state.gold += 40 + state.wave * 4;
  state.kills += 1;
  if(hasPassive('kill_patch') && state.kills % 8 === 0) healEnergy(2);
  if(hasPassive('vamp_core') && state.kills % 15 === 0) healEnergy(5);
  if(e.boss && hasPassive('titan_reserve')){ healEnergy(10); addDamageBuff(1.15, 8, 'TITAN RESERVE'); }
  updateHud();
}

  function update(dt){
    state.animClock += dt;
    for(let i=state.effects.length-1;i>=0;i--){ state.effects[i].life -= dt; if(state.effects[i].life <= 0) state.effects.splice(i,1); }
    if(state.bannerUntil && state.bannerUntil < performance.now()/1000){ hideBanner(); state.bannerUntil = 0; }
    if(!state.started || state.paused || state.over || state.menuOpen) return;
    if(state.spawnQueue.length === 0 && state.enemies.length === 0){ state.betweenWaves -= dt; if(state.betweenWaves <= 0){ spawnWave(); state.betweenWaves = state.wave % 10 === 0 ? 3.1 : 2.5; } }
    if(state.spawnQueue.length > 0){ state.spawnTimer -= dt; if(state.spawnTimer <= 0){ spawnNext(); state.spawnTimer = currentSpawnInterval(); } }
    for(const t of state.turrets){ fireTurret(t, dt); }
    bossBehaviors(dt);

    for(let i=state.bullets.length-1;i>=0;i--){
      const b = state.bullets[i]; b.life -= dt; b.x += b.vx * dt; b.y += b.vy * dt;
      if(Math.random() < 0.72){ state.effects.push({type:'trail', x:b.x, y:b.y, r:b.splash > 0 ? 4.6 : 2.6, life:0.05, color:b.color}); }
      let hit = null;
      for(const e of state.enemies){ if(Math.hypot(e.x - b.x, e.y - b.y) < e.size * 0.55 + 4){ hit = e; break; } }
      if(hit){
        applyDamage(hit, b.damage, {poison:b.poison, slow:b.slow, slowTime:b.slowTime});
        if(b.splash > 0){ for(const e of state.enemies){ if(e.id !== hit.id && Math.hypot(e.x - hit.x, e.y - hit.y) <= b.splash){ applyDamage(e, Math.round(b.damage * 0.58), {poison:b.poison ? b.poison * 0.5 : 0}); } } }
        state.effects.push({type:'impactFlash', x:b.x, y:b.y, r:b.splash > 0 ? Math.max(18,b.splash * 0.42) : 13, life:0.12, color:b.color});
        state.effects.push({type:'boom', x:b.x, y:b.y, r:b.splash > 0 ? Math.max(14,b.splash * 0.38) : 12, life:0.18, color:b.color});
        state.bullets.splice(i,1); continue;
      }
      if(b.life <= 0 || b.y < state.field.top - 40 || b.y > state.field.baseY + 30){ state.bullets.splice(i,1); }
    }

    for(let i=state.pools.length-1;i>=0;i--){
      const p = state.pools[i]; p.life -= dt;
      for(const e of state.enemies){ if(Math.hypot(e.x - p.x, e.y - p.y) <= p.r){ applyDamage(e, p.dps * dt, {}); } }
      if(p.life <= 0) state.pools.splice(i,1);
    }

    for(let i=state.enemies.length-1;i>=0;i--){
      const e = state.enemies[i];
      if(e.poisonTime > 0){ e.poisonTime -= dt; if(e.poison > 0) e.hp -= e.poison * dt; }
      if(e.slowTime > 0){ e.slowTime -= dt; } else { e.slow = 1; }
      enemyRanged(dt, e);
      e.walkClock += dt * Math.max(1.2, e.speed * 0.045);

      let blocked = false;
      for(const t of state.turrets){
        if((t.family === 'wall' || t.family === 'bunker') && t.col === e.col){
          if(e.y + e.size * 0.4 >= t.y - state.field.tileH * 0.35 && e.y < t.y + state.field.tileH * 0.24){
            blocked = true; t.hp -= (e.baseDamage * (e.smash ? 1.35 : 1)) * dt * 5.2;
            if(t.hp <= 0){ const idx = state.turrets.findIndex(v => v.id === t.id); if(idx >= 0) state.turrets.splice(idx,1); state.supportDirty = true; if(state.selectedTurretId === t.id){ state.selectedTurretId = null; refreshActionBar(); } state.effects.push({type:'boom', x:t.x, y:t.y, r:22, life:0.2}); }
            else if(state.selectedTurretId === t.id){ refreshActionBar(); }
            break;
          }
        }
      }
      if(!blocked){ e.y += e.speed * (e.slow || 1) * dt; } else { e.walkClock += dt * 1.2; }

      if(e.hp <= 0){
        onEnemyKilled(e); placeDeathPool(e); if(e.deathBurst) splashDamage(e.x, e.y, 34, e.deathBurst, {}); splitEnemy(e);
        state.effects.push({type:'boom', x:e.x, y:e.y, r:e.boss ? 30 : 20, life:0.22}); state.enemies.splice(i,1); continue;
      }
      if(e.y >= state.field.baseY){
        placeDeathPool(e); if(e.deathBurst) state.effects.push({type:'boom', x:e.x, y:state.field.baseY, r:22, life:0.18});
        state.effects.push({type:'baseGridFlash', col:e.col, life:0.30});
        damageBase(e.baseDamage + (e.boss ? 3 : 0), e.col);
        state.enemies.splice(i,1);
      }
    }

  }


  function drawField(){
    const f = state.field;
    const t = performance.now() / 1000;
    const cw = fieldWrap.clientWidth;
    const ch = fieldWrap.clientHeight;
    const laneColors = ['#1b2b38','#202d3f','#24334a','#203149','#1f2f3e'];

    const crack = (x, y, w, h) => {
      ctx.save();
      ctx.strokeStyle = 'rgba(208,230,255,.16)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x + w * 0.14, y + h * 0.18);
      ctx.lineTo(x + w * 0.35, y + h * 0.36);
      ctx.lineTo(x + w * 0.28, y + h * 0.56);
      ctx.lineTo(x + w * 0.48, y + h * 0.78);
      ctx.moveTo(x + w * 0.35, y + h * 0.36);
      ctx.lineTo(x + w * 0.58, y + h * 0.28);
      ctx.moveTo(x + w * 0.28, y + h * 0.56);
      ctx.lineTo(x + w * 0.17, y + h * 0.74);
      ctx.stroke();
      ctx.restore();
    };

    const drain = (x, y, w, h) => {
      ctx.save();
      ctx.fillStyle = 'rgba(15,22,32,.72)';
      ctx.fillRect(x + w * 0.22, y + h * 0.22, w * 0.56, h * 0.18);
      ctx.fillStyle = 'rgba(120,146,180,.22)';
      for(let i=0;i<5;i++){
        const gx = x + w * 0.28 + i * w * 0.10;
        ctx.fillRect(gx, y + h * 0.24, w * 0.03, h * 0.14);
      }
      ctx.restore();
    };

    const debris = (x, y, w, h, tint) => {
      ctx.save();
      ctx.fillStyle = tint;
      ctx.fillRect(x + w * 0.16, y + h * 0.64, w * 0.12, h * 0.08);
      ctx.fillRect(x + w * 0.36, y + h * 0.58, w * 0.18, h * 0.09);
      ctx.fillRect(x + w * 0.60, y + h * 0.66, w * 0.10, h * 0.07);
      ctx.restore();
    };

    const cable = (x, y, w, h) => {
      ctx.save();
      ctx.strokeStyle = 'rgba(88,204,255,.18)';
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(x + w * 0.08, y + h * 0.74);
      ctx.bezierCurveTo(x + w * 0.22, y + h * 0.50, x + w * 0.60, y + h * 0.96, x + w * 0.86, y + h * 0.66);
      ctx.stroke();
      ctx.restore();
    };

    ctx.fillStyle = '#0a0f15';
    ctx.fillRect(0, 0, cw, ch);

    const sky = ctx.createLinearGradient(0, 0, 0, ch);
    sky.addColorStop(0, '#0f1824');
    sky.addColorStop(0.28, '#111b28');
    sky.addColorStop(0.72, '#0c131b');
    sky.addColorStop(1, '#080b10');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, cw, ch);

    const haze = ctx.createRadialGradient(cw * 0.5, f.top * 0.35, 20, cw * 0.5, f.top * 0.35, cw * 0.78);
    haze.addColorStop(0, 'rgba(120,180,255,.10)');
    haze.addColorStop(1, 'rgba(120,180,255,0)');
    ctx.fillStyle = haze;
    ctx.fillRect(0, 0, cw, f.top + 70);

    for(let i=0;i<12;i++){
      const bx = -40 + i * (cw + 80) / 11;
      const bw = 30 + (i % 4) * 14;
      const bh = 28 + (i % 5) * 16;
      const by = Math.max(4, f.top - bh - 14 - (i % 2) * 4);
      ctx.fillStyle = i % 2 ? 'rgba(18,29,42,.85)' : 'rgba(13,23,35,.9)';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = 'rgba(155,210,255,.08)';
      for(let wx=0; wx<Math.floor(bw/10); wx++){
        for(let wy=0; wy<Math.floor(bh/14); wy++){
          if((wx + wy + i) % 3 === 0){
            ctx.fillRect(bx + 4 + wx * 9, by + 5 + wy * 11, 4, 5);
          }
        }
      }
    }

    const fieldPlate = ctx.createLinearGradient(0, f.top, 0, f.top + f.height);
    fieldPlate.addColorStop(0, '#182431');
    fieldPlate.addColorStop(0.34, '#121b26');
    fieldPlate.addColorStop(1, '#0c1218');
    ctx.fillStyle = fieldPlate;
    ctx.fillRect(f.left, f.top, f.width, f.height);

    ctx.fillStyle = 'rgba(255,255,255,.04)';
    ctx.fillRect(f.left, f.top, f.width, 4);
    ctx.fillStyle = 'rgba(0,0,0,.22)';
    ctx.fillRect(f.left, f.baseY - 20, f.width, 20);

    ctx.fillStyle = 'rgba(18,24,31,.96)';
    ctx.fillRect(f.left - 12, f.top - 2, 10, f.height + 4);
    ctx.fillRect(f.left + f.width + 2, f.top - 2, 10, f.height + 4);

    for(let c=0;c<f.cols;c++){
      const lx = f.left + c * f.tileW;
      const laneGrad = ctx.createLinearGradient(lx, f.top, lx + f.tileW, f.top + f.height);
      laneGrad.addColorStop(0, laneColors[c % laneColors.length]);
      laneGrad.addColorStop(0.5, 'rgba(30,47,69,.88)');
      laneGrad.addColorStop(1, '#172230');
      ctx.fillStyle = laneGrad;
      ctx.fillRect(lx + 2, f.top + 2, f.tileW - 4, f.height - 4);

      ctx.fillStyle = 'rgba(130,220,255,.07)';
      ctx.fillRect(lx + 8, f.top + 8, f.tileW - 16, 5);
      ctx.fillStyle = 'rgba(255,255,255,.03)';
      ctx.fillRect(lx + 8, f.baseY - 28, f.tileW - 16, 3);
    }

    for(let r=0;r<f.rows;r++){
      for(let c=0;c<f.cols;c++){
        const x = f.left + c * f.tileW;
        const y = f.top + r * f.tileH;
        const seed = (r * 17 + c * 29 + 11) % 9;

        ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,.020)' : 'rgba(0,0,0,.07)';
        ctx.fillRect(x + 1.5, y + 1.5, f.tileW - 3, f.tileH - 3);

        const tileGlow = ctx.createLinearGradient(x, y, x, y + f.tileH);
        tileGlow.addColorStop(0, 'rgba(255,255,255,.016)');
        tileGlow.addColorStop(1, 'rgba(0,0,0,.05)');
        ctx.fillStyle = tileGlow;
        ctx.fillRect(x + 3, y + 3, f.tileW - 6, f.tileH - 6);

        ctx.strokeStyle = 'rgba(124,146,176,.18)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 1.5, y + 1.5, f.tileW - 3, f.tileH - 3);

        ctx.strokeStyle = 'rgba(255,255,255,.022)';
        ctx.beginPath();
        ctx.moveTo(x + 7, y + 7);
        ctx.lineTo(x + f.tileW - 7, y + 7);
        ctx.stroke();

        if(seed === 0 || seed === 4) crack(x, y, f.tileW, f.tileH);
        if(seed === 1 && r > 1) drain(x, y, f.tileW, f.tileH);
        if(seed === 2 || seed === 7) debris(x, y, f.tileW, f.tileH, 'rgba(91,105,120,.28)');
        if(seed === 5 && r < f.rows - 1) cable(x, y, f.tileW, f.tileH);

        if(r === 0){
          ctx.save();
          ctx.fillStyle = 'rgba(255,210,120,.16)';
          const pulse = 0.72 + Math.sin(t * 3 + c * 0.9) * 0.18;
          for(let k=0;k<3;k++){
            const ax = x + f.tileW * (0.24 + k * 0.22);
            ctx.beginPath();
            ctx.moveTo(ax, y + 8);
            ctx.lineTo(ax + 9, y + 20);
            ctx.lineTo(ax - 9, y + 20);
            ctx.closePath();
            ctx.globalAlpha = pulse;
            ctx.fill();
          }
          ctx.restore();
        }
      }
    }

    for(let c=1;c<f.cols;c++){
      const x = f.left + c * f.tileW;
      ctx.strokeStyle = 'rgba(140,225,255,.06)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, f.top + 10);
      ctx.lineTo(x, f.baseY - 24);
      ctx.stroke();
    }

    for(let r=1;r<f.rows;r++){
      const y = f.top + r * f.tileH;
      ctx.strokeStyle = 'rgba(255,255,255,.03)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(f.left + 6, y);
      ctx.lineTo(f.left + f.width - 6, y);
      ctx.stroke();
    }

    const scanOffset = (t * 28) % 120;
    for(let i=-1;i<4;i++){
      const sy = f.top + i * 120 + scanOffset;
      const scan = ctx.createLinearGradient(0, sy, 0, sy + 34);
      scan.addColorStop(0, 'rgba(90,180,255,0)');
      scan.addColorStop(0.5, 'rgba(90,180,255,.035)');
      scan.addColorStop(1, 'rgba(90,180,255,0)');
      ctx.fillStyle = scan;
      ctx.fillRect(f.left + 2, sy, f.width - 4, 34);
    }

    ctx.fillStyle = 'rgba(24,32,40,.98)';
    ctx.fillRect(f.left, f.baseY - 8, f.width, 18);

    for(let i=0;i<Math.ceil(f.width / 26);i++){
      const sx = f.left + i * 26;
      ctx.fillStyle = i % 2 === 0 ? 'rgba(255,192,96,.26)' : 'rgba(35,39,46,.10)';
      ctx.beginPath();
      ctx.moveTo(sx, f.baseY - 8);
      ctx.lineTo(sx + 14, f.baseY - 8);
      ctx.lineTo(sx + 4, f.baseY + 10);
      ctx.lineTo(sx - 10, f.baseY + 10);
      ctx.closePath();
      ctx.fill();
    }

    ctx.fillStyle = 'rgba(170,220,255,.06)';
    ctx.fillRect(f.left + 8, f.baseY - 20, f.width - 16, 3);

    ctx.save();
    ctx.fillStyle = '#dff3ff';
    ctx.font = 'bold 13px sans-serif';
    ctx.shadowColor = 'rgba(130,210,255,.55)';
    ctx.shadowBlur = 7;
    ctx.fillText('ENTRY', f.left + 8, Math.max(18, f.top - 10));
    ctx.restore();

    const gaugeY = Math.min(fieldWrap.clientHeight - 26, f.baseY + 22);
    const gaugeBg = ctx.createLinearGradient(f.left, gaugeY, f.left + f.width, gaugeY);
    gaugeBg.addColorStop(0, '#2e0a12');
    gaugeBg.addColorStop(0.5, '#4f101d');
    gaugeBg.addColorStop(1, '#24070d');
    ctx.fillStyle = gaugeBg;
    ctx.fillRect(f.left, gaugeY, f.width, 9);
    const energyWidth = f.width * Math.max(0, state.energy / energyMaxValue());
    if(energyWidth > 0){
      const gaugeFill = ctx.createLinearGradient(f.left, gaugeY, f.left + energyWidth, gaugeY);
      gaugeFill.addColorStop(0.00, '#fff3f6');
      gaugeFill.addColorStop(0.18, '#ffb4c1');
      gaugeFill.addColorStop(0.55, '#ff566f');
      gaugeFill.addColorStop(1.00, '#b70f2f');
      ctx.fillStyle = gaugeFill;
      ctx.fillRect(f.left, gaugeY, energyWidth, 9);
      ctx.fillStyle = 'rgba(255,255,255,.28)';
      ctx.fillRect(f.left, gaugeY, energyWidth, 2);
    }
    ctx.fillStyle = '#ffd0d6';
    ctx.fillText('BASE ENERGY', f.left + 8, gaugeY + 21);
    ctx.textAlign = 'left';
    ctx.fillText(`${Math.max(0, Math.round(state.energy))}/${energyMaxValue()}`, f.left + 96, gaugeY + 21);
  }

  function shapeCtx(c, x,y,w,h,color){ c.save(); c.translate(x,y); c.fillStyle = color; c.strokeStyle = 'rgba(255,255,255,.18)'; c.lineWidth = Math.max(1, Math.min(w,h)*0.05); }
  function endShape(c){ c.restore(); }
  function barrel(c,x,y,w,h){ c.fillRect(x,y,w,h); }
  function dome(c,x,y,r){ c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fill(); }
  function poly(c,pts){ c.beginPath(); c.moveTo(pts[0][0],pts[0][1]); for(let i=1;i<pts.length;i++) c.lineTo(pts[i][0],pts[i][1]); c.closePath(); c.fill(); }

  function drawInstallModel(c, item, cx, cy, w, h, level=1, isCard=false){

        c.fillStyle = 'rgba(255,255,255,.12)';
        c.fillRect(-W*0.18*scale, H*0.18, W*0.36*scale, H*0.03);

      c.fillStyle = accent;
    };

    const glowCore = (x,y,r,alpha=0.22) => {
      c.save();
      c.globalAlpha = alpha;
      c.beginPath();
      c.arc(x,y,r,0,Math.PI*2);
      c.fill();
      c.restore();
    };

        if(lv3) glowCore(0, -H*0.03, W*0.07, 0.26);
        break;
      case 'reactor':

        c.fillStyle = '#2a3444';
        c.beginPath();
        c.moveTo(0,-H*0.24); c.lineTo(W*0.18,-H*0.12); c.lineTo(W*0.18,H*0.08); c.lineTo(0,H*0.20); c.lineTo(-W*0.18,H*0.08); c.lineTo(-W*0.18,-H*0.12); c.closePath();
        c.fill();
        c.fillStyle = accent;
        glowCore(0,-H*0.02,W*0.13,lv3 ? 0.34 : 0.24);
        c.beginPath(); c.arc(0,-H*0.02,W*0.10,0,Math.PI*2); c.fill();
        c.fillStyle = '#f7fbff';
        c.beginPath(); c.arc(0,-H*0.02,W*0.04,0,Math.PI*2); c.fill();
        if(lv2){
          c.strokeStyle = 'rgba(255,255,255,.40)';

  function drawMonsterBody(e){
    const s = e.size;
    const pace = (e.walkClock || 0) + (e.animSeed || 0);
    const shamble = Math.sin(pace * (e.boss ? 0.72 : 0.94));
    const lurch = Math.sin(pace * (e.boss ? 0.42 : 0.55));
    const drag = Math.abs(Math.sin(pace * (e.boss ? 0.78 : 0.98)));
    const bob = e.body === 'phantom' ? Math.sin(pace * 0.86) * 2.4 : drag * (e.boss ? 1.3 : 1.9);
    const sway = lurch * (e.boss ? 1.2 : 1.8);
    const torsoTilt = -0.18 + shamble * 0.08;
    const headTilt = -0.10 + shamble * 0.06;
    const armLead = -0.38 + shamble * 0.18;
    const armDrag = 0.22 - shamble * 0.16;
    const legLead = 0.22 + shamble * 0.18;
    const legDrag = -0.10 - shamble * 0.14;

    const limb = (x, y, w, h, rot, color) => {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.fillStyle = color;
      ctx.fillRect(-w/2, 0, w, h);
      ctx.restore();
    };
    const head = (r, tint=0) => {
      ctx.save();
      ctx.translate(0, -s*0.28);
      ctx.rotate(headTilt);
      ctx.fillStyle = e.color;
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#0d0d0d';
      ctx.fillRect(-r*0.55, -r*0.08, Math.max(2, r*0.26), Math.max(2, r*0.22));
      ctx.fillRect(r*0.18, -r*0.04, Math.max(2, r*0.24), Math.max(2, r*0.20));
      ctx.fillStyle = e.accent || '#c8ffc2';
      ctx.globalAlpha = 0.72 + tint * 0.18;
      ctx.fillRect(-r*0.52, -r*0.12, Math.max(1.8, r*0.18), Math.max(1.8, r*0.14));
      ctx.fillRect(r*0.22, -r*0.10, Math.max(1.8, r*0.16), Math.max(1.8, r*0.12));
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#341313';
      ctx.fillRect(-r*0.20, r*0.34, r*0.36, Math.max(2, r*0.12));
      ctx.restore();
    };
    const torsoRect = (w, h) => {
      ctx.save();
      ctx.rotate(torsoTilt);
      ctx.fillStyle = e.color;
      ctx.fillRect(-w/2, -s*0.02, w, h);
      ctx.fillStyle = 'rgba(34,18,18,.24)';
      ctx.fillRect(-w*0.24, h*0.20, w*0.14, h*0.22);
      ctx.fillRect(w*0.06, h*0.48, w*0.12, h*0.18);
      ctx.restore();
    };

    ctx.save();
    ctx.translate(e.x + sway, e.y + bob);

    switch(e.body){
      case 'walker':
        limb(-s*0.18, s*0.12, s*0.09, s*0.42, legLead, e.color);
        limb(s*0.14, s*0.16, s*0.09, s*0.40, legDrag, e.color);
        limb(-s*0.28, -s*0.02, s*0.08, s*0.34, armLead, e.color);
        limb(s*0.26, s*0.02, s*0.08, s*0.38, armDrag, e.color);
        torsoRect(s*0.42, s*0.50);
        head(s*0.24, 0.2);
        break;
      case 'runner':
        limb(-s*0.15, s*0.10, s*0.08, s*0.44, legLead * 1.55, e.color);
        limb(s*0.12, s*0.10, s*0.08, s*0.42, legDrag * 1.45, e.color);
        limb(-s*0.24, -s*0.08, s*0.07, s*0.28, armLead * 1.2, e.color);
        limb(s*0.22, -s*0.02, s*0.07, s*0.30, armDrag * 1.1, e.color);
        ctx.save(); ctx.rotate(torsoTilt - 0.18); ctx.fillStyle = e.color; ctx.fillRect(-s*0.16,-s*0.02,s*0.34,s*0.42); ctx.restore();
        head(s*0.21, 0.1);
        break;
      case 'brute':
        limb(-s*0.20, s*0.16, s*0.13, s*0.38, legLead * 0.8, e.color);
        limb(s*0.18, s*0.18, s*0.13, s*0.36, legDrag * 0.7, e.color);
        limb(-s*0.38, -s*0.02, s*0.12, s*0.34, armLead * 0.7, e.color);
        limb(s*0.36, s*0.04, s*0.12, s*0.36, armDrag * 0.5, e.color);
        torsoRect(s*0.58, s*0.60);
        head(s*0.28, 0.18);
        break;
      case 'toxic':
        limb(-s*0.16, s*0.14, s*0.10, s*0.38, legLead, e.color);
        limb(s*0.13, s*0.16, s*0.10, s*0.36, legDrag, e.color);
        limb(-s*0.26, -s*0.02, s*0.08, s*0.30, armLead, e.color);
        limb(s*0.22, 0, s*0.08, s*0.33, armDrag, e.color);
        torsoRect(s*0.42, s*0.50);
        head(s*0.23, 0.2);
        ctx.fillStyle = e.accent; ctx.beginPath(); ctx.arc(-s*0.16,s*0.12,s*0.08,0,Math.PI*2); ctx.arc(s*0.12,s*0.22,s*0.10,0,Math.PI*2); ctx.fill();
        break;
      case 'shield':
        limb(-s*0.14, s*0.18, s*0.10, s*0.32, legLead * 0.8, e.color);
        limb(s*0.10, s*0.18, s*0.10, s*0.32, legDrag * 0.8, e.color);
        limb(-s*0.25, -s*0.02, s*0.08, s*0.24, armLead * 0.6, e.color);
        torsoRect(s*0.34, s*0.48);
        head(s*0.23, 0.08);
        ctx.fillStyle = '#dfeeff'; ctx.beginPath(); ctx.moveTo(s*0.14,-s*0.10); ctx.lineTo(s*0.40,s*0.04); ctx.lineTo(s*0.36,s*0.34); ctx.lineTo(s*0.12,s*0.28); ctx.closePath(); ctx.fill();
        break;
      case 'spitter':
        limb(-s*0.15, s*0.16, s*0.09, s*0.32, legLead, e.color);
        limb(s*0.14, s*0.16, s*0.09, s*0.30, legDrag, e.color);
        limb(-s*0.22, 0, s*0.08, s*0.24, armLead * 0.8, e.color);
        limb(s*0.18, 0.02, s*0.08, s*0.26, armDrag * 0.7, e.color);
        torsoRect(s*0.40, s*0.46);
        head(s*0.22, 0.18);
        ctx.fillStyle = e.accent; ctx.fillRect(s*0.10,-s*0.18,s*0.20,s*0.08);
        break;
      case 'titan':
        limb(-s*0.22, s*0.20, s*0.15, s*0.42, legLead * 0.55, e.color);
        limb(s*0.20, s*0.22, s*0.15, s*0.40, legDrag * 0.45, e.color);
        limb(-s*0.40, -s*0.02, s*0.13, s*0.36, armLead * 0.45, e.color);
        limb(s*0.38, 0.02, s*0.13, s*0.38, armDrag * 0.35, e.color);
        torsoRect(s*0.66, s*0.70);
        head(s*0.30, 0.18);
        break;
      case 'reaper':
        limb(-s*0.24, 0, s*0.07, s*0.42, armLead * 0.4, '#e8deff');
        torsoRect(s*0.36, s*0.56);
        head(s*0.22, 0.14);
        break;
      case 'bulwark':
        limb(-s*0.16, s*0.20, s*0.12, s*0.34, legLead * 0.5, e.color);
        limb(s*0.16, s*0.20, s*0.12, s*0.34, legDrag * 0.45, e.color);
        torsoRect(s*0.52, s*0.60);
        head(s*0.26, 0.12);
        ctx.fillStyle='#dff1ff'; ctx.fillRect(s*0.18,-s*0.10,s*0.16,s*0.44);
        break;
      case 'howler':
        limb(-s*0.15, s*0.16, s*0.10, s*0.34, legLead * 1.1, e.color);
        limb(s*0.14, s*0.18, s*0.10, s*0.32, legDrag * 1.05, e.color);
        limb(-s*0.24, -s*0.02, s*0.08, s*0.28, armLead * 0.9, e.color);
        limb(s*0.22, 0.02, s*0.08, s*0.30, armDrag * 0.8, e.color);
        torsoRect(s*0.36, s*0.52);
        head(s*0.22, 0.2);
        ctx.fillStyle='#fff0c9'; ctx.beginPath(); ctx.arc(0,-s*0.08,s*0.10,0,Math.PI*2); ctx.fill();
        break;
      case 'sieger':
        limb(-s*0.14, s*0.18, s*0.10, s*0.32, legLead, e.color);
        limb(s*0.14, s*0.18, s*0.10, s*0.30, legDrag, e.color);
        torsoRect(s*0.40, s*0.54);
        head(s*0.24, 0.12);
        ctx.fillStyle='#fff'; ctx.fillRect(s*0.14,-s*0.18,s*0.18,s*0.10);
        break;
      case 'glacier':
        limb(-s*0.14, s*0.18, s*0.10, s*0.30, legLead * 0.7, e.color);
        limb(s*0.14, s*0.18, s*0.10, s*0.30, legDrag * 0.7, e.color);
        torsoRect(s*0.44, s*0.54);
        head(s*0.24, 0.08);
        ctx.fillStyle='#e9fcff'; poly(ctx,[[-s*0.10,s*0.08],[0,-s*0.18],[s*0.10,s*0.08]]);
        break;
      case 'phantom':
        ctx.globalAlpha = 0.72;
        head(s*0.22, 0.08);
        ctx.beginPath(); ctx.moveTo(-s*0.24,-s*0.02); ctx.lineTo(s*0.24,-s*0.02); ctx.lineTo(s*0.18,s*0.44); ctx.lineTo(0,s*0.32 + Math.sin(pace*1.4)*4); ctx.lineTo(-s*0.18,s*0.44); ctx.closePath(); ctx.fill();
        ctx.globalAlpha = 1;
        break;
      case 'growth':
        limb(-s*0.18, s*0.20, s*0.12, s*0.32, legLead * 0.65, e.color);
        limb(s*0.18, s*0.20, s*0.12, s*0.30, legDrag * 0.55, e.color);
        torsoRect(s*0.48, s*0.60);
        head(s*0.26, 0.16);
        ctx.fillStyle='#d6ffd2'; ctx.fillRect(-s*0.32,s*0.08,s*0.12,s*0.28); ctx.fillRect(s*0.20,s*0.08,s*0.12,s*0.28);
        break;
      case 'abyss':
        limb(-s*0.18, s*0.22, s*0.13, s*0.36, legLead * 0.5, e.color);
        limb(s*0.18, s*0.22, s*0.13, s*0.34, legDrag * 0.45, e.color);
        torsoRect(s*0.56, s*0.66);
        head(s*0.28, 0.16);
        ctx.fillStyle='#fff0d5'; ctx.fillRect(-s*0.08,-s*0.18,s*0.16,s*0.12);
        break;
      default:
        limb(-s*0.16, s*0.18, s*0.10, s*0.32, legLead, e.color);
        limb(s*0.14, s*0.18, s*0.10, s*0.30, legDrag, e.color);
        limb(-s*0.24, -s*0.02, s*0.08, s*0.28, armLead, e.color);
        limb(s*0.22, 0.02, s*0.08, s*0.30, armDrag, e.color);
        torsoRect(s*0.40, s*0.48);
        head(s*0.24, 0.1);
        break;
    }

    if(!e.boss){
      ctx.fillStyle = 'rgba(120,255,132,.18)';
      ctx.fillRect(-s*0.18,-s*0.58,s*0.36,4);
    }
    ctx.restore();
  }

  function drawEnemies(){
    for(const e of state.enemies){
      drawMonsterBody(e);
      if(e.boss){ ctx.strokeStyle = 'rgba(255,255,255,.32)'; ctx.lineWidth = 3; ctx.strokeRect(e.x - e.size * 0.56, e.y - e.size * 0.74, e.size * 1.12, e.size * 1.38); }

      const barW = e.size * 1.08;
      const hpRatio = Math.max(0, Math.min(1, e.hp / e.maxHp));
      const shieldRatio = e.maxShield > 0 ? Math.max(0, Math.min(1, e.shield / e.maxShield)) : 0;
      const hpX = e.x - barW * 0.5;
      const hpY = e.y - e.size * 1.06;
      const hpH = e.boss ? 3.5 : 2.5;
      const shieldH = e.boss ? 2.5 : 1.75;
      const radius = hpH * 0.5;

      // HP bar background: clearly translucent
      ctx.save();
      ctx.fillStyle = 'rgba(6,10,16,0.18)';
      ctx.beginPath();
      ctx.roundRect(hpX, hpY, barW, hpH, radius);
      ctx.fill();

      if(hpRatio > 0){
        const hpGrad = ctx.createLinearGradient(hpX, hpY, hpX + barW, hpY);
        if(e.boss){
          hpGrad.addColorStop(0.00, 'rgba(255,236,188,0.40)');
          hpGrad.addColorStop(0.22, 'rgba(255,194,118,0.72)');
          hpGrad.addColorStop(0.60, 'rgba(255,126,88,0.90)');
          hpGrad.addColorStop(1.00, 'rgba(255,78,78,0.96)');
        }else{
          hpGrad.addColorStop(0.00, 'rgba(208,255,236,0.34)');
          hpGrad.addColorStop(0.24, 'rgba(122,255,204,0.68)');
          hpGrad.addColorStop(0.60, 'rgba(74,224,168,0.86)');
          hpGrad.addColorStop(1.00, 'rgba(44,188,132,0.94)');
        }
        ctx.fillStyle = hpGrad;
        ctx.beginPath();
        ctx.roundRect(hpX, hpY, Math.max(hpH, barW * hpRatio), hpH, radius);
        ctx.fill();

        // top sheen so the gradient reads more clearly
        const hpShine = ctx.createLinearGradient(hpX, hpY, hpX, hpY + hpH);
        hpShine.addColorStop(0.00, 'rgba(255,255,255,0.26)');
        hpShine.addColorStop(0.55, 'rgba(255,255,255,0.08)');
        hpShine.addColorStop(1.00, 'rgba(255,255,255,0.00)');
        ctx.fillStyle = hpShine;
        ctx.beginPath();
        ctx.roundRect(hpX, hpY, Math.max(hpH, barW * hpRatio), hpH * 0.62, radius);
        ctx.fill();
      }

      ctx.strokeStyle = 'rgba(255,255,255,0.10)';
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.roundRect(hpX, hpY, barW, hpH, radius);
      ctx.stroke();

      if(e.maxShield > 0){
        const shieldY = hpY - (e.boss ? 4.5 : 4);
        const shieldRadius = shieldH * 0.5;

        ctx.fillStyle = 'rgba(18,34,60,0.16)';
        ctx.beginPath();
        ctx.roundRect(hpX, shieldY, barW, shieldH, shieldRadius);
        ctx.fill();

        if(shieldRatio > 0){
          const shieldGrad = ctx.createLinearGradient(hpX, shieldY, hpX + barW, shieldY);
          shieldGrad.addColorStop(0.00, 'rgba(222,241,255,0.30)');
          shieldGrad.addColorStop(0.35, 'rgba(160,214,255,0.52)');
          shieldGrad.addColorStop(1.00, 'rgba(84,158,255,0.82)');
          ctx.fillStyle = shieldGrad;
          ctx.beginPath();
          ctx.roundRect(hpX, shieldY, Math.max(shieldH, barW * shieldRatio), shieldH, shieldRadius);
          ctx.fill();
        }

        ctx.strokeStyle = 'rgba(184,220,255,0.12)';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.roundRect(hpX, shieldY, barW, shieldH, shieldRadius);
        ctx.stroke();
      }

      ctx.restore();
    }
  }

  function drawBullets(){
    for(const b of state.bullets){
      const r = b.splash ? 1.7 : 0.82;
      const a = Math.max(0.18, b.life / 1.2);
      const glowR = b.splash ? r * 1.35 : r * 1.18;
      const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, glowR);
      g.addColorStop(0, 'rgba(255,255,255,' + (0.52 * a).toFixed(3) + ')');
      g.addColorStop(0.24, b.color || 'rgba(255,210,160,.62)');
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.save();
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(b.x, b.y, glowR, 0, Math.PI*2); ctx.fill();
      ctx.shadowColor = b.color;
      ctx.shadowBlur = b.splash ? 4 : 2;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
  function drawPools(){ for(const p of state.pools){ ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); } }

  function drawEffects(){
    for(const e of state.effects){
      if(e.type === 'boom'){
        const a = Math.max(0, e.life / 0.22);
        ctx.save();
        ctx.shadowColor = e.color || 'rgba(255,200,120,.9)';
        ctx.shadowBlur = 12 + 18 * a;
        ctx.strokeStyle = 'rgba(255,236,180,' + (0.95 * a).toFixed(3) + ')';
        ctx.lineWidth = 2.6 + 2.4 * a;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (1 - e.life / 0.22 + 0.20), 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }
      else if(e.type === 'beam'){
        const a = Math.max(0, e.life / 0.14);
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,' + (0.72 * a).toFixed(3) + ')';
        ctx.lineWidth = 7;
        ctx.shadowColor = e.color || 'rgba(255,120,120,.9)';
        ctx.shadowBlur = 9;
        ctx.beginPath(); ctx.moveTo(e.x1, e.y1); ctx.lineTo(e.x2, e.y2); ctx.stroke();
        ctx.strokeStyle = e.color || 'rgba(255,120,120,.9)';
        ctx.lineWidth = 3.2;
        ctx.beginPath(); ctx.moveTo(e.x1, e.y1); ctx.lineTo(e.x2, e.y2); ctx.stroke();
        ctx.restore();
      }
      else if(e.type === 'chain'){
        const a = Math.max(0, e.life / 0.14);
        ctx.save();
        ctx.shadowColor = e.color || 'rgba(187,160,255,.9)';
        ctx.shadowBlur = 12;
        ctx.strokeStyle = 'rgba(255,255,255,' + (0.64 * a).toFixed(3) + ')';
        ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(e.x1, e.y1); for(const p of e.points){ ctx.lineTo(p.x, p.y); } ctx.stroke();
        ctx.strokeStyle = e.color || 'rgba(187,160,255,.9)';
        ctx.lineWidth = 2.4;
        ctx.beginPath(); ctx.moveTo(e.x1, e.y1); for(const p of e.points){ ctx.lineTo(p.x, p.y); } ctx.stroke();
        ctx.restore();
      }
      else if(e.type === 'spit'){
        ctx.save();
        ctx.shadowColor = 'rgba(212,130,255,.7)';
        ctx.shadowBlur = 7;
        ctx.strokeStyle = 'rgba(245,194,255,.85)';
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(e.x1, e.y1); ctx.lineTo(e.x2, e.y2); ctx.stroke();
        ctx.strokeStyle = 'rgba(212,130,255,.95)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(e.x1, e.y1); ctx.lineTo(e.x2, e.y2); ctx.stroke();
        ctx.restore();
      }
      else if(e.type === 'poison'){ ctx.strokeStyle = 'rgba(134,244,126,.85)'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (1 - e.life / 0.24 + 0.2), 0, Math.PI*2); ctx.stroke(); }
      else if(e.type === 'frost'){ ctx.strokeStyle = 'rgba(165,229,255,.9)'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (1 - e.life / 0.22 + 0.2), 0, Math.PI*2); ctx.stroke(); }
      else if(e.type === 'aura'){
        ctx.save();
        ctx.shadowColor = e.color || 'rgba(255,150,130,.9)'; ctx.shadowBlur = 9;
        ctx.strokeStyle = e.color || 'rgba(255,150,130,.9)'; ctx.lineWidth = 2.6;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (1 - e.life / 0.14 + 0.1), 0, Math.PI*2); ctx.stroke();
        ctx.restore();
      }
      else if(e.type === 'heal'){ ctx.strokeStyle = 'rgba(190,255,210,.9)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(e.x, e.y, 18 * (1 - e.life / 0.24 + 0.2), 0, Math.PI*2); ctx.stroke(); }
      else if(e.type === 'coin'){ ctx.fillStyle = 'rgba(255,220,100,' + Math.max(0, e.life / 0.5) + ')'; ctx.font = 'bold 12px sans-serif'; ctx.fillText('+$', e.x - 8, e.y - (1 - e.life / 0.5) * 12); }
      else if(e.type === 'shield'){ ctx.strokeStyle = 'rgba(120,170,255,.85)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(e.x, e.y, 16 * (1 - e.life / 0.14 + 0.2), 0, Math.PI*2); ctx.stroke(); }
      else if(e.type === 'muzzle'){
        const a = Math.max(0, e.life / 0.10);
        const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r * (1.18 + a * 0.55));
        g.addColorStop(0, 'rgba(255,255,255,' + (0.95 * a).toFixed(3) + ')');
        g.addColorStop(0.28, e.color || 'rgba(255,220,180,.88)');
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (1.18 + a * 0.55), 0, Math.PI*2); ctx.fill();
      }
      else if(e.type === 'trail'){
        const a = Math.max(0, e.life / 0.07);
        const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r * (0.95 + a * 0.35));
        g.addColorStop(0, 'rgba(255,255,255,' + (0.60 * a).toFixed(3) + ')');
        g.addColorStop(0.3, e.color || 'rgba(255,200,140,.5)');
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (0.95 + a * 0.35), 0, Math.PI*2); ctx.fill();
      }
      else if(e.type === 'impactFlash'){
        const a = Math.max(0, e.life / 0.12);
        const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r * (0.82 + a * 0.42));
        g.addColorStop(0, 'rgba(255,255,255,' + (0.94 * a).toFixed(3) + ')');
        g.addColorStop(0.20, e.color || 'rgba(255,185,120,.88)');
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (0.82 + a * 0.42), 0, Math.PI*2); ctx.fill();
      }
      else if(e.type === 'baseGridFlash'){
        const a = Math.max(0, e.life / 0.30);
        const f = state.field;
        const cols = [Math.max(0, e.col - 1), e.col, Math.min(f.cols - 1, e.col + 1)].filter((v, i, arr) => arr.indexOf(v) === i);
        const rows = [Math.max(0, f.rows - 2), f.rows - 1];
        ctx.save();
        ctx.shadowColor = 'rgba(255,255,255,' + (0.95 * a).toFixed(3) + ')';
        ctx.shadowBlur = 8 + 22 * a;
        for(const col of cols){
          for(const row of rows){
            const x = f.left + col * f.tileW + 2;
            const y = f.top + row * f.tileH + 2;
            const w = f.tileW - 4;
            const h = f.tileH - 4;
            const weight = (col === e.col && row === f.rows - 1) ? 1 : (col === e.col ? 0.78 : 0.52);
            ctx.fillStyle = 'rgba(255,255,255,' + (0.14 * a * weight).toFixed(3) + ')';
            ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = 'rgba(255,255,255,' + (0.88 * a * weight).toFixed(3) + ')';
            ctx.lineWidth = 1.6 + 2.2 * a * weight;
            ctx.strokeRect(x, y, w, h);
          }
        }
        ctx.restore();
      }
      else if(e.type === 'place'){ ctx.strokeStyle = e.color || 'rgba(120,255,160,.85)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(e.x, e.y, 10 + (1 - e.life / 0.2) * 12, 0, Math.PI*2); ctx.stroke(); }
      else if(e.type === 'phase'){ ctx.strokeStyle = 'rgba(224,224,255,.9)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(e.x, e.y, 8 + (1 - e.life / 0.12) * 10, 0, Math.PI*2); ctx.stroke(); }
    }
  }

  function drawInstallDragPreview(){
    if(!state.dragInstallActive || !state.dragInstallMoved || !state.dragInstallTile || state.mode !== 'install') return;
    const { col, row } = state.dragInstallTile;
    const f = state.field;
    const x = f.left + col * f.tileW + 2;
    const y = f.top + row * f.tileH + 2;
    const w = f.tileW - 4;
    const h = f.tileH - 4;
    const item = getInstall(state.selectedInstall);
    const blocked = !canPlaceAt(col, row) || state.gold < item.cost || !installUnlocked(item) || installCapReached(item) || state.turrets.length >= installSlotLimit();
    ctx.save();
    ctx.fillStyle = blocked ? 'rgba(255,110,110,.22)' : 'rgba(75,208,138,.24)';
    ctx.strokeStyle = blocked ? 'rgba(255,110,110,.95)' : 'rgba(129,255,190,.95)';
    ctx.lineWidth = 2.2;
    ctx.fillRect(x, y, w, h);
    ctx.strokeRect(x, y, w, h);
    ctx.restore();
  }

  function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); drawField(); drawInstallDragPreview(); drawPools(); drawTurrets(); drawEnemies(); drawBullets(); drawEffects(); }

  function onPointerDown(ev){
    if(state.menuOpen) return;
    const p = pointerPos(ev);
    const tile = tileAt(p.x, p.y);
    if(!tile) return;
    const occupied = state.turrets.find(t => t.col === tile.col && t.row === tile.row);
    if(occupied){
      selectTurret(occupied.id);
      return;
    }
    if(state.mode === 'install'){
      showBanner('하단 카드에서 전장으로 드래그해 설치하세요.', 0.9);
    }
  }
  function onPointerMove(ev){ updateInstallDrag(ev); }
  function onPointerUp(ev){ endInstallDrag(ev); }
  function onTouchMove(ev){
    if(!state.dragInstallActive || state.dragInstallTouchId == null) return;
    const touch = findTouchByIdentifier(ev.touches, state.dragInstallTouchId) || findTouchByIdentifier(ev.changedTouches, state.dragInstallTouchId);
    if(!touch) return;
    ev.preventDefault();
    updateInstallDrag(pseudoPointerEventFromTouch(touch));
  }
  function onTouchEnd(ev){
    if(!state.dragInstallActive || state.dragInstallTouchId == null) return;
    const touch = findTouchByIdentifier(ev.changedTouches, state.dragInstallTouchId);
    if(!touch) return;
    ev.preventDefault();
    endInstallDrag(pseudoPointerEventFromTouch(touch));
  }
  function onTouchCancel(ev){
    if(!state.dragInstallActive || state.dragInstallTouchId == null) return;
    const touch = findTouchByIdentifier(ev.changedTouches, state.dragInstallTouchId);
    if(!touch) return;
    ev.preventDefault();
    clearInstallDragState();
  }
  function onPointerCancel(ev){
    if(Number.isFinite(state.dragInstallPointerId) && Number.isFinite(ev.pointerId) && state.dragInstallPointerId !== ev.pointerId) return;
    if(Number.isFinite(ev.pointerId) && canvas.releasePointerCapture){
      try{ canvas.releasePointerCapture(ev.pointerId); } catch(err){}
    }
    clearInstallDragState();
  }
  function onPointerLeave(ev){
    if(!state.dragInstallActive) return;
    updateInstallDrag(ev);
  }
  function loop(ts){ const now = ts / 1000; const dt = Math.min(0.033, state.last ? now - state.last : 0.016); state.last = now; update(dt); draw(); requestAnimationFrame(loop); }

  canvas.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointermove', onPointerMove, { passive:true });
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('pointercancel', onPointerCancel);
  window.addEventListener('touchmove', onTouchMove, { passive:false });
  window.addEventListener('touchend', onTouchEnd, { passive:false });
  window.addEventListener('touchcancel', onTouchCancel, { passive:false });
  canvas.addEventListener('pointerleave', onPointerLeave);
  for(const btn of document.querySelectorAll('button')){
    btn.addEventListener('pointerdown', ev => flashButton(btn, ev));
  }
  startBtn.addEventListener('click', () => {
    if(!state.currentUser){
      openMenu('auth');
      setAuthStatus('로그인 후 게임을 시작할 수 있습니다.');
      return;
    }
    closeMenu();
    if(state.started && !state.over){
      state.paused = !state.paused;
      syncStartToggleButton();
      showBanner(state.paused ? '일시정지' : '재개');
      return;
    }
    startGame();
  });
  pauseBtn.addEventListener('click', () => {});
  resetBtn.addEventListener('click', resetGame);
  upgradeBtn.addEventListener('click', upgradeSelected);
  sellBtn.addEventListener('click', sellSelected);
  modeInstallBtn.addEventListener('click', () => changeMode('install'));
  modePassiveBtn.addEventListener('click', () => changeMode('passive'));
  menuBtn.addEventListener('click', () => {
    if(state.menuOpen && state.authFlowUnlocked){
      closeMenu();
      return;
    }
    openMenu(state.currentUser ? 'home' : 'auth');
  });
  menuCloseBtn.addEventListener('click', closeMenu);
  if(menuBackdrop) menuBackdrop.addEventListener('click', () => {
    if(state.authFlowUnlocked) closeMenu();
  });
  rankToggleBtn.addEventListener('click', () => {
    if(!state.currentUser){ openMenu('auth'); setAuthStatus('로그인 후 랭킹을 확인할 수 있습니다.'); return; }
    toggleLeaderboardPanel();
  });
  onlineUsersBtn.addEventListener('click', () => {
    if(!state.currentUser){ openMenu('auth'); setAuthStatus('로그인 후 접속자 수를 확인할 수 있습니다.'); return; }
    togglePresencePanel();
  });
  chatToggleBtn.addEventListener('click', () => {
    if(!state.currentUser){ openMenu('auth'); setAuthStatus('로그인 후 채팅을 사용할 수 있습니다.'); return; }
    toggleChatPanel();
  });
  chatCollapseBtn.addEventListener('click', () => toggleChatPanel(false));
  leaderboardRefreshBtn.addEventListener('click', () => { void refreshLeaderboard(); });
  presenceRefreshBtn.addEventListener('click', () => { void refreshPresence(); });
  authLoginBtn.type = 'button';
  authRegisterOpenBtn.type = 'button';
  authRegisterBtn.type = 'button';
  registerCloseBtn.type = 'button';
  authPolicyViewBtn.type = 'button';
  policyCloseBtn.type = 'button';
  policyRejectBtn.type = 'button';
  policyAgreeBtn.type = 'button';
  authRegisterOpenBtn.addEventListener('click', () => openRegisterModal(true));
  registerCloseBtn.addEventListener('click', () => closeRegisterModal());
  registerModal.querySelector('.policyBackdrop').addEventListener('click', () => closeRegisterModal(true));
  authLoginBtn.addEventListener('click', ev => { ev.preventDefault(); loginCurrentMode(); });
  authRegisterBtn.onclick = ev => { ev.preventDefault(); registerCurrentMode(); };
  loginPassInput.addEventListener('keydown', ev => { if(ev.key === 'Enter') loginCurrentMode(); });
  loginIdInput.addEventListener('keydown', ev => { if(ev.key === 'Enter') loginCurrentMode(); });
  registerNameInput.addEventListener('keydown', ev => { if(ev.key === 'Enter') registerCurrentMode(); });
  if(registerEmailInput) registerEmailInput.addEventListener('keydown', ev => { if(ev.key === 'Enter') registerCurrentMode(); });
  registerPassInput.addEventListener('input', updatePasswordMatchState);
  if(registerPassConfirmInput) registerPassConfirmInput.addEventListener('input', updatePasswordMatchState);
  registerPassInput.addEventListener('keydown', ev => { if(ev.key === 'Enter') registerCurrentMode(); });
  if(registerPassConfirmInput) registerPassConfirmInput.addEventListener('keydown', ev => { if(ev.key === 'Enter') registerCurrentMode(); });
  registerIdInput.addEventListener('keydown', ev => { if(ev.key === 'Enter') registerCurrentMode(); });
  authPolicyViewBtn.addEventListener('click', openPolicyModal);
  policyCloseBtn.addEventListener('click', closePolicyModal);
  policyRejectBtn.onclick = ev => { ev.preventDefault(); rejectPolicyAgreement(); };
  policyAgreeBtn.onclick = ev => { ev.preventDefault(); approvePolicyAndRegister(); };
  policyModal.querySelector('.policyBackdrop').addEventListener('click', closePolicyModal);
  newGameBtn.addEventListener('click', beginNewGame);
  logoutBtn.addEventListener('click', () => { void logoutCurrentUser(); });
  deleteAccountBtn.addEventListener('click', () => { void deleteCurrentAccount(); });
  chatSendBtn.addEventListener('click', () => { void sendChatMessage(); });
  chatInput.addEventListener('keydown', ev => { if(ev.key === 'Enter'){ ev.preventDefault(); void sendChatMessage(); } });
  sliderWrap.addEventListener('scroll', () => { const page = Math.round(sliderWrap.scrollLeft / Math.max(1, sliderWrap.clientWidth)); if(page !== state.page){ state.page = Math.max(0, Math.min(pageCount()-1, page)); syncPageUI(); } }, {passive:true});
  window.addEventListener('resize', () => { resize(); sliderWrap.scrollLeft = sliderWrap.clientWidth * state.page; }, {passive:true});

  window.addEventListener('beforeunload', () => { persistUserStats(); });

  async function boot(){
    resetGame({skipProfileSave:true});
    resize();
    syncAutoLoginCheckbox();
  renderPatchNotes();
    if(autoLoginCheck){
      autoLoginCheck.addEventListener('change', () => {
        const enabled = !!autoLoginCheck.checked;
        writeAutoLoginPreference(enabled);
        if(enabled) syncSavedLoginInputs(true);
      });
    }
    initSupabaseClient(false);
    renderLeaderboard([]);
    renderPresence([], 0);
    renderChatMessages([]);
    const updated = await playUpdateOverlay(false);
    await hydrateSession({ forceAuth: updated });
    requestAnimationFrame(loop);
  }

  void boot();
})();
</script>
</body>
</html>
