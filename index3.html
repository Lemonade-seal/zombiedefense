<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>Zombie Defense Fixed Frame Slider Models</title>
<style>
  :root{
    --bg:#11161f; --panel:#1a2230; --panel2:#0f141d; --line:#2b3648; --text:#e7eefb; --muted:#9fb0cb;
    --accent:#4bd08a; --warn:#ffce57; --danger:#ff6b6b; --blue:#72b3ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;overflow:hidden}
  body{
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    display:flex;
    justify-content:center;
    align-items:stretch;
    background:
      radial-gradient(circle at top, rgba(70,104,158,.20), transparent 42%),
      linear-gradient(180deg,#0b1017,#141c29 44%,#0f141d);
  }
  #app{
    width:100%;
    height:100%;
    display:grid;
    grid-template-rows:auto 1fr auto;
    gap:0;
    background:linear-gradient(180deg,#0d1219,#151c28);
  }
  .topbar{display:grid;grid-template-columns:1fr auto;gap:8px;padding:8px 10px;border-bottom:1px solid var(--line);background:rgba(15,20,29,.95)}
  .stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:7px 8px;min-width:0}
  .label{font-size:10px;letter-spacing:.08em;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .value{font-size:15px;font-weight:800;line-height:1.1;margin-top:2px;white-space:nowrap}
  #onlineTopVal{position:relative;font-size:13px;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center}
  #onlineTopVal.nickOverflow{mask-image:linear-gradient(90deg, transparent 0, #000 8%, #000 92%, transparent 100%);-webkit-mask-image:linear-gradient(90deg, transparent 0, #000 8%, #000 92%, transparent 100%)}
  .nickTicker{display:inline-flex;align-items:center;min-width:max-content;white-space:nowrap;will-change:transform;transform:translateX(0)}
  .nickTicker span{display:inline-block;white-space:nowrap;padding-right:24px}
  .nickTicker.marqueeLoop{animation-name:nickTickerLoop;animation-duration:var(--nick-duration,6s);animation-timing-function:linear;animation-iteration-count:infinite;animation-fill-mode:both}
  @keyframes nickTickerLoop{from{transform:translateX(0)}to{transform:translateX(calc(-1 * var(--nick-travel, 0px)))}}
  .installDragBadge{position:fixed;left:0;top:0;transform:translate(-50%,-50%);display:none;align-items:center;justify-content:center;min-height:30px;padding:0 12px;border-radius:999px;border:1px solid rgba(155,255,205,.62);background:rgba(18,38,27,.92);color:#d6ffe9;font-size:11px;font-weight:900;letter-spacing:.02em;box-shadow:0 10px 28px rgba(0,0,0,.3);z-index:70;pointer-events:none;white-space:nowrap}
  .installDragBadge.open{display:inline-flex}
  .controls{display:flex;gap:6px;align-items:stretch;flex-wrap:wrap;justify-content:flex-end}
  button{position:relative;overflow:hidden;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:12px;padding:0 12px;font-weight:800;font-size:13px;min-height:42px;transition:transform .08s ease, box-shadow .14s ease, filter .16s ease}
  button:active{transform:translateY(1px) scale(.992);filter:brightness(1.06)}
  button.flashPulse{box-shadow:0 0 0 1px rgba(255,255,255,.22),0 0 18px rgba(255,255,255,.16),0 0 26px rgba(115,185,255,.18)}
  .tapFlash{position:absolute;left:0;top:0;width:18px;height:18px;border-radius:999px;pointer-events:none;transform:translate(-50%,-50%) scale(.2);background:radial-gradient(circle, rgba(255,255,255,.96) 0%, rgba(187,228,255,.85) 28%, rgba(120,190,255,.42) 56%, rgba(120,190,255,0) 78%);mix-blend-mode:screen;animation:tapFlash .46s ease-out forwards}
  @keyframes tapFlash{0%{opacity:.95;transform:translate(-50%,-50%) scale(.2)}55%{opacity:.72}100%{opacity:0;transform:translate(-50%,-50%) scale(9)}}
  button.primary{background:#163224;border-color:#27533c;color:#c8ffe1}
  button.warn{background:#372712;border-color:#5e4321;color:#ffe5a1}
  button.small{min-height:34px;padding:0 10px;font-size:12px;border-radius:10px}
  button:disabled{opacity:.45}
  #fieldWrap{position:relative;min-height:0;background:#0c1118}
  #game{display:block;width:100%;height:100%;touch-action:none}
  .msg{position:absolute;left:12px;right:12px;top:10px;pointer-events:none;display:flex;justify-content:center}
  #banner{display:none;background:rgba(8,12,18,.34);border:1px solid rgba(120,140,170,.32);border-radius:12px;padding:8px 12px;font-size:13px;font-weight:800;backdrop-filter:blur(3px);max-width:92%;text-align:center;opacity:0;transition:opacity .22s ease}
  .bottombar{padding:8px 10px 10px;border-top:1px solid var(--line);background:rgba(15,20,29,.98);display:grid;gap:8px;grid-template-rows:34px 116px 42px}
  .caption{display:grid;grid-template-columns:1fr auto;align-items:center;color:var(--muted);font-size:11px;font-weight:700;padding:0 2px;gap:8px;min-height:34px}
  .captionRight{display:flex;gap:8px;align-items:center}
  .dots{display:flex;gap:5px;align-items:center}
  .seg{display:flex;gap:6px;align-items:center}
  .seg .tab{min-height:30px;padding:0 10px;font-size:11px;border-radius:10px}
  .dot{width:8px;height:8px;border-radius:999px;background:#334157;border:1px solid #495872}
  .dot.active{background:#81c3ff}
  .sliderWrap{height:116px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-radius:14px}
  .sliderWrap.dragLock{touch-action:none;overflow:hidden}
  .sliderWrap::-webkit-scrollbar{display:none}
  .track{display:flex;gap:8px;height:100%}
  .deckPage{flex:0 0 100%;height:100%;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;scroll-snap-align:start}
  .card{height:116px;background:linear-gradient(180deg,#1d2736,#161d29);border:1px solid #2a3648;border-radius:14px;padding:7px 6px;display:grid;grid-template-rows:38px 24px 14px 12px;gap:4px;box-shadow:0 6px 14px rgba(0,0,0,.15);overflow:hidden}
  .card.selected{border-color:#78c3ff;box-shadow:inset 0 0 0 2px rgba(120,195,255,.85)}
  .preview{width:100%;height:38px;border-radius:10px;background:linear-gradient(180deg,#101720,#172131);border:1px solid rgba(255,255,255,.06)}
  .name{font-size:10px;line-height:1.1;font-weight:800;height:24px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .cost{font-size:11px;color:#ffe08f;font-weight:900}
  .meta{display:block;font-size:10px;line-height:1;color:#9ec2ff;height:12px;white-space:nowrap;overflow:hidden;text-overflow:clip;transform-origin:left center}
  .actionbar{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;min-height:42px}
  .actionInfo{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:4px 7px;font-size:10px;color:var(--muted);height:42px;display:block;overflow:hidden;line-height:1.06;text-align:left;word-break:keep-all;overflow-wrap:anywhere;white-space:normal}
  .card.locked{filter:saturate(.78) brightness(.88)}
  .card.capped{box-shadow:inset 0 0 0 1px rgba(255,206,87,.28)}
  .card.installBlocked{border-color:#6f7681;box-shadow:inset 0 0 0 1px rgba(171,178,189,.38),0 6px 14px rgba(0,0,0,.15)}
  .card.installBlocked.selected{border-color:#6f7681;box-shadow:inset 0 0 0 1px rgba(171,178,189,.42),0 6px 14px rgba(0,0,0,.15)}
  .card .meta.lockInfo{color:#ffd893}
  .footerHint{display:none}
  @media (max-width:640px){
    .topbar{grid-template-columns:1fr}
    .controls{justify-content:stretch}
    .controls button{flex:1 1 0}
    .stat{padding:6px 7px}
    .value{font-size:14px}
    .deckPage{gap:6px}
    .card{height:116px;padding:6px 5px}
    .actionbar{grid-template-columns:1fr auto auto}
    .preview{height:34px}
  }
  @media (min-width:768px){
    body{padding:12px}
    #app{
      height:calc(100vh - 24px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      max-width:1180px;
      border:1px solid rgba(95,114,145,.34);
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,.32);
    }
    .topbar{padding:12px 14px;gap:12px}
    .stats{gap:10px}
    .stat{padding:9px 10px;border-radius:14px}
    .label{font-size:11px}
    .value{font-size:18px}
    #onlineTopVal{font-size:15px}
    .controls{gap:8px}
    button{font-size:14px;min-height:46px;padding:0 16px}
    button.small{min-height:38px;font-size:12px}
    #banner{font-size:14px;padding:9px 14px}
    .bottombar{padding:10px 14px 14px;grid-template-rows:36px 124px 44px;gap:10px}
    .caption,.actionbar,.sliderWrap{width:100%;max-width:1060px;margin:0 auto}
    .caption{font-size:12px}
    .sliderWrap{height:124px}
    .deckPage{gap:10px}
    .card{height:124px;padding:8px 7px;grid-template-rows:42px 26px 15px 12px}
    .preview{height:42px}
    .name{font-size:11px;height:26px}
    .cost{font-size:12px}
    .actionInfo{height:44px;font-size:11px;line-height:1.07;padding:4px 8px}
  }
  @media (min-width:1100px){
    body{padding:16px}
    #app{
      height:calc(100vh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      max-width:1420px;
      border-radius:24px;
    }
    .topbar{padding:14px 18px}
    .stats{grid-template-columns:repeat(5,minmax(120px,1fr))}
    .value{font-size:20px}
    #onlineTopVal{font-size:16px}
    .controls button{min-width:110px}
    .bottombar{padding:12px 18px 18px;grid-template-rows:38px 132px 46px}
    .caption,.actionbar,.sliderWrap{max-width:1220px}
    .sliderWrap{height:132px}
    .card{height:132px}
    #banner{font-size:15px;padding:10px 16px}
  }
</style>

function activeDamageBuffMul(){
  const now = nowSec();
  state.damageBuffs = state.damageBuffs.filter(b => b.until > now);
  let mul = 1;
  for(const b of state.damageBuffs) mul *= b.mul;
  return mul;
}
function passiveDamageMul(){
  const max = energyMaxValue();
  let mul = activeDamageBuffMul();
  if(hasPassive('redline_drive') && state.energy <= max * 0.40) mul *= 1.18;
  if(hasPassive('overflow_drive') && state.energy >= max * 0.90) mul *= 1.15;
  if(hasPassive('last_stand_amp')) mul *= 1 + Math.min(0.24, Math.floor((max - state.energy) / 10) * 0.03);
  return mul;
}

function fitDeckMetaText(scope=deckTrack){
  const nodes = scope ? scope.querySelectorAll('.card .meta') : [];
  const desktop = window.matchMedia('(min-width:1100px)').matches;
  const tablet = window.matchMedia('(min-width:768px)').matches;
  const max = desktop ? 11 : (tablet ? 10.2 : 9.4);
  const min = 6.1;

  nodes.forEach(el => {
    el.style.fontSize = max + 'px';
    el.style.letterSpacing = '0';
    el.style.transform = 'none';

    let low = min;
    let high = max;
    for(let i=0; i<10; i++){
      const mid = (low + high) / 2;
      el.style.fontSize = mid + 'px';
      if(el.scrollWidth <= el.clientWidth + 0.5) low = mid;
      else high = mid;
    }
    el.style.fontSize = low.toFixed(2) + 'px';

    if(el.scrollWidth > el.clientWidth + 0.5){
      const sx = Math.max(0.82, (el.clientWidth - 1) / Math.max(1, el.scrollWidth));
      el.style.transform = `scaleX(${sx.toFixed(3)})`;
    }
  });
}

    if(w <= 10) return 1;
    if(w <= 25) return 2;
    if(w <= 40) return 3;
    if(w <= 55) return 4;
    return 5;
  }
  function installRoleGroup(item){
    const family = item.family;
    if(family === 'projectile' || family === 'bunker') return 1; // 직사
    if(['splash','beam','chain','aura','barrel'].includes(family)) return 2; // 특수기
    if(['trap','trap_burst','trap_slow'].includes(family)) return 3; // 함정
    return 4; // 방벽/지원/회복/경제/기타
  }
  function passiveRoleGroup(item){
    if(['redline_drive','overflow_drive','revenge_core','last_stand_amp','blood_furnace','titan_reserve'].includes(item.key)) return 1; // 전투
    if(['core_cell','fortress_cell','plated_hull','guardian_shell','barrier_valve','emergency_bulkhead','shock_fence','frost_fence'].includes(item.key)) return 2; // 생존
    if(['nano_repair','repair_matrix','kill_patch','vamp_core','surge_cycle','salvage_relay'].includes(item.key)) return 3; // 회복/경제
    return 4; // 기타
  }
  function sortDeckItems(list, mode){
    return [...list].sort((a, b) => {
      const ta = mode === 'install' ? installTier(a) : passiveTier(a);
      const tb = mode === 'install' ? installTier(b) : passiveTier(b);
      if(ta !== tb) return ta - tb;

      const ga = mode === 'install' ? installRoleGroup(a) : passiveRoleGroup(a);
      const gb = mode === 'install' ? installRoleGroup(b) : passiveRoleGroup(b);
      if(ga !== gb) return ga - gb;

      const wa = mode === 'install' ? installReqWave(a.key) : passiveReqWave(a.key);
      const wb = mode === 'install' ? installReqWave(b.key) : passiveReqWave(b.key);
      if(wa !== wb) return wa - wb;

      const ca = a.cost || 0;
      const cb = b.cost || 0;
      if(ca !== cb) return ca - cb;

      return a.name.localeCompare(b.name);
    });
  }
  function installSlotLimit(wave=currentProgressWave()){
    if(wave >= 90) return 18;
    if(wave >= 75) return 17;
    if(wave >= 60) return 16;
    if(wave >= 45) return 15;
    if(wave >= 35) return 14;
    if(wave >= 25) return 13;
    if(wave >= 15) return 12;
    if(wave >= 8) return 11;
    return 10;
  }
  function passiveSlotLimit(wave=currentProgressWave()){
    if(wave >= 95) return 8;
    if(wave >= 75) return 7;
    if(wave >= 55) return 6;
    if(wave >= 40) return 5;
    if(wave >= 25) return 4;
    if(wave >= 10) return 3;
    return 2;
  }
  function activePassiveCount(){
    return Object.values(state.passives).filter(v => v > 0).length;
  }
  function currentInstallCount(key){
    return state.turrets.reduce((n, t) => n + (t.base.key === key ? 1 : 0), 0);
  }
  function installUnlocked(item){
    return currentProgressWave() >= installReqWave(item.key);
  }
  function passiveUnlocked(item){
    return currentProgressWave() >= passiveReqWave(item.key);
  }
  function installCapReached(item){
    return currentInstallCount(item.key) >= installMaxCount(item.key);
  }
  function installRestrictionText(item){
    const parts = [`해금 W${installReqWave(item.key)}`, `개별 ${currentInstallCount(item.key)}/${installMaxCount(item.key)}기`, `전체 ${state.turrets.length}/${installSlotLimit()}기`];
    return parts.join(' · ');
  }
  function passiveRestrictionText(item){
    return `해금 W${passiveReqWave(item.key)} · 슬롯 ${activePassiveCount()}/${passiveSlotLimit()}개`;
  }
  function fitActionInfo(){
    const el = actionInfo;
    if(!el) return;
    let min = 6.5;
    let max = window.matchMedia('(min-width:1100px)').matches ? 11.5 : (window.matchMedia('(min-width:768px)').matches ? 10.8 : 10);
    el.style.fontSize = max + 'px';
    el.style.lineHeight = '1.06';
    while(max - min > 0.15){
      const mid = (min + max) / 2;
      el.style.fontSize = mid + 'px';
      if(el.scrollHeight <= el.clientHeight + 0.5 && el.scrollWidth <= el.clientWidth + 0.5) min = mid;
      else max = mid;
    }
    el.style.fontSize = min.toFixed(2) + 'px';
  }
  function setActionInfo(text){
    actionInfo.textContent = text;
    fitActionInfo();
  }
  function installDescription(item){
    if(!item) return '설치물을 선택하세요.';
    const roleMap = {
      projectile:'전방 적 1체를 빠르게 사격하는 기본 화력 시설',
      splash:'범위 폭발로 뭉친 적을 정리하는 중화기 시설',
      beam:'직선 화력으로 단일 표적을 강하게 지지는 빔 시설',
      chain:'전격이 주변 적에게 튀는 연쇄 화력 시설',
      aura:'근접 범위 안 적을 지속적으로 태우는 화염 시설',
      trap:'접촉한 적을 즉시 깎아내는 근접 함정',
      trap_burst:'밟은 적 주변까지 폭발시키는 매설 함정',
      trap_slow:'빙결 폭발로 이동을 묶는 제어 함정',
      wall:'진입을 지연시키는 방어용 장벽',
      bunker:'버티면서 사격까지 수행하는 전방 거점',
      support_range:'주변 아군 시설의 사거리를 늘리는 지원 장치',
      support_damage:'주변 아군 시설의 공격력을 높이는 증폭 장치',
      support_slow:'주변 적의 이동을 늦추는 제어 장치',
      heal:'주변 아군 시설을 주기적으로 수리하는 정비 장치',
      gold:'주기적으로 골드를 생산하는 경제 시설',
      barrel:'독성 장판으로 근접 적을 약화시키는 장치'
    };

    const stats = [];
    if(item.damage != null) stats.push(`피해 ${fmtStat(item.damage)}`);
    if(item.range != null) stats.push(`사거리 ${fmtStat(item.range)}`);
    if(item.fire != null) stats.push(`주기 ${fmtStat(item.fire)}초`);
    if(item.splash != null) stats.push(`폭발 ${fmtStat(item.splash)}`);
    if(item.chain != null) stats.push(`연쇄 ${fmtStat(item.chain + 1)}체`);
    if(item.spread != null) stats.push(`산탄 ${fmtStat(item.spread)}`);
    if(item.poison != null) stats.push(`독 ${fmtStat(item.poison)}`);
    if(item.slow != null) stats.push(`둔화 ${Math.round((1 - item.slow) * 100)}%`);
    if(item.slowTime != null) stats.push(`지속 ${fmtStat(item.slowTime)}초`);
    if(item.hp != null) stats.push(`내구 ${fmtStat(item.hp)}`);
    if(item.aura != null) stats.push(`범위 ${fmtStat(item.aura)}`);
    if(item.buffRange != null) stats.push(`사거리 +${fmtStat(item.buffRange)}`);
    if(item.buffDamage != null) stats.push(`공격력 x${fmtStat(item.buffDamage)}`);
    if(item.enemySlow != null) stats.push(`적속도 x${fmtStat(item.enemySlow)}`);
    if(item.heal != null) stats.push(`회복 ${fmtStat(item.heal)}`);
    if(item.income != null) stats.push(`수익 +${fmtStat(item.income)}`);

    return `${item.name} · ${roleMap[item.family] || '전장용 설치물'} · 설치 $${item.cost} · 업글비 높음${stats.length ? ' · ' + stats.slice(0, 4).join(' · ') : ''}`;
  }

function updateHud(){
  clampEnergy();

  waveVal.textContent = String(state.wave);
  killVal.textContent = String(state.kills);

  updateUserBadge();
  refreshActionBar();
}

function updateAuthGate(){
  const locked = !state.authFlowUnlocked;
  app.classList.toggle('authLocked', locked);
  [startBtn, pauseBtn, resetBtn, upgradeBtn, sellBtn, modeInstallBtn, modePassiveBtn].forEach(btn => {
    if(btn) btn.disabled = locked;
  });
}


function syncStartToggleButton(){
  if(!startBtn) return;
  if(state.started && !state.over){
    startBtn.textContent = state.paused ? '재개' : '정지';
  }else{
    startBtn.textContent = '시작';
  }
  startBtn.classList.toggle('warn', startBtn.textContent === '정지');
  startBtn.classList.toggle('primary', startBtn.textContent !== '정지');
}

create or replace function public.delete_my_account()
returns void
language plpgsql
security definer
set search_path = public, auth
as $$
declare
  uid uuid := auth.uid();
begin
  if uid is null then
    raise exception 'not authenticated';
  end if;

  delete from auth.users where id = uid;
end;
$$;

revoke all on function public.delete_my_account() from public;
grant execute on function public.delete_my_account() to authenticated;</pre>

function safeJsonParse(raw, fallback){
  try{
    return raw ? JSON.parse(raw) : fallback;
  } catch(err){
    return fallback;
  }
}

function getSupabaseConfig(){
  const bootConfig = {
    url: String(SUPABASE_BOOT_CONFIG?.url || '').trim(),
    anonKey: String(SUPABASE_BOOT_CONFIG?.anonKey || '').trim(),
  };
  if(bootConfig.url && bootConfig.anonKey) return bootConfig;
  const stored = safeJsonParse(localStorage.getItem(SUPABASE_CONFIG_KEY), null);
  return {
    url: String(stored?.url || '').trim(),
    anonKey: String(stored?.anonKey || '').trim(),
  };
}

function saveSupabaseConfig(config){
  localStorage.setItem(SUPABASE_CONFIG_KEY, JSON.stringify({
    url: String(config?.url || '').trim(),
    anonKey: String(config?.anonKey || '').trim(),
  }));
}

function normalizeUsername(name=''){
  return String(name || '').trim().replace(/\s+/g, '').slice(0, 16);
}

function isValidDisplayName(value=''){
  const clean = normalizeUsername(value);
  return /^[A-Za-z0-9가-힣ㄱ-ㅎㅏ-ㅣ`~!@#$%^&*()\-_=+\[\]{}\\|;:'\",.<>/?]{2,16}$/.test(clean);
}

function normalizeLoginId(value=''){
  return String(value || '').trim().toLowerCase().replace(/\s+/g, '').replace(/[^a-z0-9가-힣ㄱ-ㅎㅏ-ㅣ]/g, '').slice(0, 24);
}

function isValidLoginId(value=''){
  return /^[a-z0-9가-힣ㄱ-ㅎㅏ-ㅣ]{4,24}$/.test(normalizeLoginId(value));
}

function normalizeRecoveryEmail(value=''){
  return String(value || '').trim().toLowerCase();
}

function readAutoLoginPreference(){
  try{
    return localStorage.getItem(AUTO_LOGIN_PREF_KEY) === '1';
  } catch(err){
    return false;
  }
}

function clearSavedLoginCredentials(){
  try{
    localStorage.removeItem(AUTO_LOGIN_CREDENTIALS_KEY);
  } catch(err){}
}

function readSavedLoginCredentials(){
  try{
    const raw = localStorage.getItem(AUTO_LOGIN_CREDENTIALS_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    const email = normalizeRecoveryEmail(parsed?.email || '');
    const password = String(parsed?.password || '');
    if(!isValidRecoveryEmail(email) || !password) return { email:'', password:'' };
    return { email, password };
  } catch(err){
    return { email:'', password:'' };
  }
}

function writeSavedLoginCredentials(email='', password=''){
  const authEmail = normalizeRecoveryEmail(email);
  const pass = String(password || '');
  if(!isValidRecoveryEmail(authEmail) || !pass){
    clearSavedLoginCredentials();
    return;
  }
  try{
    localStorage.setItem(AUTO_LOGIN_CREDENTIALS_KEY, JSON.stringify({ email: authEmail, password: pass }));
  } catch(err){}
}

function syncSavedLoginInputs(force=false){
  if(!loginIdInput || !loginPassInput) return;
  if(!readAutoLoginPreference()) return;
  const creds = readSavedLoginCredentials();
  if(creds.email && (force || !String(loginIdInput.value || '').trim())) loginIdInput.value = creds.email;

function readLoginEmailMap(){
  try{
    const raw = localStorage.getItem(LOGIN_EMAIL_MAP_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    return parsed && typeof parsed === 'object' ? parsed : {};
  } catch(err){
    return {};
  }
}

function rememberLoginEmail(loginId='', email=''){
  const key = normalizeLoginId(loginId);
  const value = normalizeRecoveryEmail(email);
  if(!key || !isValidRecoveryEmail(value)) return;
  const current = readLoginEmailMap();
  current[key] = value;
  try{
    localStorage.setItem(LOGIN_EMAIL_MAP_KEY, JSON.stringify(current));
  } catch(err){}
}

function resolveLoginEmail(loginValue=''){
  const raw = String(loginValue || '').trim();
  const email = normalizeRecoveryEmail(raw);
  if(isValidRecoveryEmail(email)) return email;
  const id = normalizeLoginId(raw);
  if(!id) return '';
  const map = readLoginEmailMap();
  return isValidRecoveryEmail(map[id]) ? map[id] : '';
}

function isValidRecoveryEmail(value=''){
  const clean = normalizeRecoveryEmail(value);
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(clean);
}

function hasInvalidEmailStructure(value=''){
  const clean = normalizeRecoveryEmail(value);
  if(!clean || clean.length > 120) return true;
  if(clean.includes('..')) return true;
  const parts = clean.split('@');
  if(parts.length !== 2) return true;
  const [localPart, domainPart] = parts;
  if(!localPart || !domainPart) return true;
  if(localPart.startsWith('.') || localPart.endsWith('.')) return true;
  if(domainPart.startsWith('-') || domainPart.endsWith('-')) return true;
  if(domainPart.startsWith('.') || domainPart.endsWith('.')) return true;
  if(!/^[a-z0-9.!#$%&'*+/=?^_`{|}~-]+$/i.test(localPart)) return true;
  if(!/^[a-z0-9.-]+$/i.test(domainPart)) return true;
  if(!domainPart.includes('.')) return true;
  const labels = domainPart.split('.');
  if(labels.some(label => !label || label.startsWith('-') || label.endsWith('-'))) return true;
  const tld = labels[labels.length - 1] || '';
  if(!/^[a-z]{2,24}$/i.test(tld)) return true;
  return false;
}

function isBlockedEmailDomain(domain=''){
  const clean = String(domain || '').trim().toLowerCase();
  const blocked = new Set([
    'example.com',
    'example.net',
    'example.org',
    'test.com',
    'invalid',
    'localhost',
  ]);
  return blocked.has(clean);
}

async function hasReachableEmailDomain(value=''){
  const clean = normalizeRecoveryEmail(value);
  if(hasInvalidEmailStructure(clean)) return false;
  const domain = clean.split('@')[1];
  if(!domain) return false;
  if(isBlockedEmailDomain(domain)) return false;
  try{
    const query = `https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=MX`;
    const response = await fetch(query, { method: 'GET', cache: 'no-store' });
    if(!response.ok) return false;
    const payload = await response.json();
    const statusCode = Number(payload?.Status);
    const answers = Array.isArray(payload?.Answer) ? payload.Answer : [];
    return statusCode === 0 && answers.length > 0;
  } catch(err){
    return false;
  }
}

function isValidPassword(value=''){
  const pass = String(value || '');
  return /^[a-z0-9`~!@#$%^&*()\-_=+\[\]{}\\|;:'\",.<>/?]{6,72}$/.test(pass);
}

function base64UrlEncodeUtf8(text=''){
  try{
    const bytes = new TextEncoder().encode(String(text || ''));
    let bin = '';
    for(const b of bytes) bin += String.fromCharCode(b);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
  } catch(err){
    return '';
  }
}

function base64UrlDecodeUtf8(text=''){
  try{
    const normalized = String(text || '').replace(/-/g, '+').replace(/_/g, '/');
    const padded = normalized + '='.repeat((4 - (normalized.length % 4 || 4)) % 4);
    const bin = atob(padded);
    const bytes = Uint8Array.from(bin, ch => ch.charCodeAt(0));
    return new TextDecoder().decode(bytes);
  } catch(err){
    return '';
  }
}

function loginIdToEmailAlias(loginId=''){
  const clean = normalizeLoginId(loginId);
  if(!clean) return '';
  if(/^[a-z0-9._-]{4,24}$/.test(clean)) return `${clean}@players-mail.net`;
  return `u-${base64UrlEncodeUtf8(clean)}@players-mail.net`;
}

function emailAliasToLoginId(email=''){
  const clean = String(email || '').trim().toLowerCase();
  const local = clean.includes('@') ? clean.split('@')[0] : clean;
  if(local.startsWith('u-')) return normalizeLoginId(base64UrlDecodeUtf8(local.slice(2)));
  return normalizeLoginId(local);
}

function updateOnlineTopTicker(name='-'){
  if(!onlineTopVal) return;
  clearOnlineTopTickerTimers();
  const rawName = String(name || '-');
  const safeName = escapeHtml(rawName);
  onlineTopVal.classList.remove('nickOverflow');
  onlineTopVal.innerHTML = `<div class="nickTicker"><span class="nickTickerPrimary">${safeName}</span><span class="nickTickerRepeat" aria-hidden="true">${safeName}</span></div>`;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      if(!onlineTopVal) return;
      const ticker = onlineTopVal.querySelector('.nickTicker');
      const primary = onlineTopVal.querySelector('.nickTickerPrimary');
      if(!ticker || !primary) return;
      ticker.classList.remove('marqueeLoop');
      ticker.style.removeProperty('--nick-travel');
      ticker.style.removeProperty('--nick-duration');
      ticker.style.animationDelay = '0s';
      ticker.style.transform = 'translateX(0)';
      const travel = Math.ceil(primary.getBoundingClientRect().width);
      const overflow = Math.max(0, travel - onlineTopVal.clientWidth);
      if(overflow <= 2){
        onlineTopVal.classList.remove('nickOverflow');
        onlineTopVal.textContent = rawName;
        return;
      }
      const duration = Math.min(16, Math.max(5.5, travel / 22));
      onlineTopVal.classList.add('nickOverflow');
      ticker.style.setProperty('--nick-travel', `${travel}px`);
      ticker.style.setProperty('--nick-duration', `${duration.toFixed(2)}s`);
      void ticker.offsetWidth;
      onlineTickerStartTimer = window.setTimeout(() => {
        ticker.classList.add('marqueeLoop');
      }, 450);
    });
  });
}

function formatStamp(iso=''){
  if(!iso) return '없음';
  const d = new Date(iso);
  if(Number.isNaN(d.getTime())) return '없음';
  const yy = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  return `${yy}.${mm}.${dd} ${hh}:${mi}`;
}

function formatChatStamp(iso=''){
  if(!iso) return '--:--';
  const d = new Date(iso);
  if(Number.isNaN(d.getTime())) return '--:--';
  const hh = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  return `${hh}:${mi}`;
}

function initSupabaseClient(force=false){
  const config = getSupabaseConfig();
  if(supabaseUrlInput) supabaseUrlInput.value = config.url || '';
  if(supabaseAnonKeyInput) supabaseAnonKeyInput.value = config.anonKey || '';
  if(!config.url || !config.anonKey){
    state.supabase = null;
    state.supabaseReady = false;
    state.supabaseUrl = '';
    state.supabaseAnonKey = '';
    setSupabaseStatus('자동 연결용 SUPABASE_BOOT_CONFIG 값이 비어 있습니다. 이 HTML 파일 안에 URL과 anon key를 넣어야 즉시 동기화됩니다.', false, true);
    return false;
  }
  if(!window.supabase || typeof window.supabase.createClient !== 'function'){
    state.supabase = null;
    state.supabaseReady = false;
    setSupabaseStatus('Supabase 브라우저 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인하세요.');
    return false;
  }
  if(!force && state.supabaseReady && state.supabaseUrl === config.url && state.supabaseAnonKey === config.anonKey){
    return true;
  }
  try{
    state.supabase = window.supabase.createClient(config.url, config.anonKey, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
    });
    state.supabaseReady = true;
    state.supabaseUrl = config.url;
    state.supabaseAnonKey = config.anonKey;
    bindAuthStateListener();
    setSupabaseStatus('Supabase 자동 연결 준비 완료. 저장된 세션이 있으면 즉시 복원합니다.', true);
    return true;
  } catch(err){
    state.supabase = null;
    state.supabaseReady = false;
    setSupabaseStatus(`Supabase 초기화 실패: ${err?.message || err}`);
    return false;
  }
}


function bindAuthStateListener(){
  if(!(state.supabaseReady && state.supabase)) return;
  if(state.authSubscription) return;
  const result = state.supabase.auth.onAuthStateChange((event, session) => {
    const user = session?.user || null;
    if((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED' || event === 'INITIAL_SESSION') && user){
      if(state.currentUser?.userId === user.id) return;
      void applyOnlineUser(user).catch(err => {
        const message = err?.message || String(err);
        setAuthStatus(`세션 반영 실패: ${message}`);
      });
      return;
    }
    if(event === 'SIGNED_OUT'){
      stopOnlineLoops();
      state.currentUser = null;
      state.profileCache = null;
      updateUserBadge();
      renderLeaderboard([]);
      renderPresence([], 0);
      renderChatMessages([]);
      closeSidePanels();
      if(menuLayer.classList.contains('open')) renderMenu('auth');
    }
  });
  state.authSubscription = result?.data?.subscription || result?.subscription || null;
}

    createdAt: row?.created_at || Date.now(),
    updatedAt: row?.updated_at || Date.now(),
  }, context?.name || 'PLAYER');
}

async function pushProfileToSupabase(profile, context=currentOnlineContext(), silent=true){
  if(!state.supabaseReady || !state.supabase || !context?.userId) return false;
  const payload = profileToSupabaseRow(profile, context);
  if(!payload) return false;
  const { data, error } = await state.supabase
    .from(SUPABASE_TABLE)
    .upsert(payload, { onConflict: 'user_id' })
    .select('user_id,login_id,recovery_email,display_name,best_wave,best_kills,privacy_agreed_at,privacy_version,created_at,updated_at')
    .single();
  if(error){
    if(!silent){
      setAuthStatus(`온라인 저장 실패: ${error.message}`);
      showBanner('온라인 저장 실패', 1.5);
    }
    return false;
  }
  state.profileCache = supabaseRowToProfile(data, context);
  if(state.currentUser){
    state.currentUser.name = state.profileCache.name;
    state.currentUser.loginId = state.profileCache.loginId;
    state.currentUser.recoveryEmail = state.profileCache.recoveryEmail;
    state.currentUser.privacyAgreedAt = state.profileCache.privacyAgreedAt;
    updateUserBadge();
  }
  return true;
}

function queueRemoteProfileSync(profile){
  if(!state.currentUser || state.currentUser.provider !== 'supabase') return;
  state.profileCache = ensureProfileShape(profile, state.currentUser.name);
  state.remoteQueuedProfile = JSON.parse(JSON.stringify(state.profileCache));
  state.remoteQueuedContext = {...currentOnlineContext()};
  if(state.remoteSyncInFlight){
    state.remoteSyncQueued = true;
    return;
  }
  void drainRemoteProfileQueue();
}

async function drainRemoteProfileQueue(){
  if(state.remoteSyncInFlight || !state.remoteQueuedProfile || !state.remoteQueuedContext?.userId) return false;
  state.remoteSyncInFlight = true;
  const profile = state.remoteQueuedProfile;
  const context = state.remoteQueuedContext;
  state.remoteQueuedProfile = null;
  state.remoteQueuedContext = null;
  state.remoteSyncQueued = false;
  const ok = await pushProfileToSupabase(profile, context, true);
  state.remoteSyncInFlight = false;
  if(state.remoteSyncQueued || state.remoteQueuedProfile) return drainRemoteProfileQueue();
  return ok;
}

async function fetchOnlineProfile(ensureRow=false){
  if(!state.supabaseReady || !state.supabase || !state.currentUser?.userId) return null;
  const context = currentOnlineContext();
  const { data, error } = await state.supabase
    .from(SUPABASE_TABLE)
    .select('user_id,login_id,recovery_email,display_name,best_wave,best_kills,privacy_agreed_at,privacy_version,created_at,updated_at')
    .eq('user_id', state.currentUser.userId)
    .maybeSingle();
  if(error){
    setAuthStatus(`프로필 테이블을 읽지 못했습니다: ${error.message}`);
    return defaultProfileForUser(state.currentUser);
  }
  if(!data){
    const base = defaultProfileForUser(state.currentUser);
    state.profileCache = base;
    if(ensureRow) await pushProfileToSupabase(base, context, true);
    return base;
  }
  const profile = supabaseRowToProfile(data, context);
  state.profileCache = profile;
  state.currentUser.name = profile.name;
  state.currentUser.loginId = profile.loginId;
  state.currentUser.recoveryEmail = profile.recoveryEmail;
  state.currentUser.privacyAgreedAt = profile.privacyAgreedAt;
  updateUserBadge();
  return profile;
}

async function refreshLeaderboard(){
  if(!(state.currentUser && state.currentUser.provider === 'supabase' && state.supabaseReady && state.supabase)){
    renderLeaderboard([]);
    return;
  }
  const { data, error } = await state.supabase
    .from(SUPABASE_TABLE)
    .select('display_name,best_wave,best_kills,updated_at')
    .order('best_wave', { ascending: false })
    .order('best_kills', { ascending: false })
    .limit(10);
  if(error){
    renderLeaderboard([]);
    if(floatingLeaderboardList) floatingLeaderboardList.innerHTML = `<div class="menuHint">랭킹을 불러오지 못했습니다. SQL 정책을 확인하세요.</div>`;
    if(leaderboardList) leaderboardList.innerHTML = `<div class="menuHint">랭킹을 불러오지 못했습니다. SQL 정책을 확인하세요.</div>`;
    return;
  }
  state.leaderboard = Array.isArray(data) ? data : [];
  renderLeaderboard(state.leaderboard);
}

async function touchPresence(remove=false){
  if(!(state.currentUser && state.supabaseReady && state.supabase)) return false;
  const ctx = currentOnlineContext();
  if(!ctx?.userId) return false;
  if(remove){
    await state.supabase.from(SUPABASE_PRESENCE_TABLE).delete().eq('user_id', ctx.userId);
    return true;
  }
  const payload = {
    user_id: ctx.userId,
    login_id: ctx.loginId || '',
    display_name: ctx.name || 'PLAYER',
    last_seen: new Date().toISOString(),
  };
  const { error } = await state.supabase.from(SUPABASE_PRESENCE_TABLE).upsert(payload, { onConflict: 'user_id' });
  return !error;
}

async function refreshPresence(){
  if(!(state.currentUser && state.supabaseReady && state.supabase)){
    renderPresence([], 0);
    return;
  }
  const cutoff = new Date(Date.now() - 90000).toISOString();
  const { data, error, count } = await state.supabase
    .from(SUPABASE_PRESENCE_TABLE)
    .select('display_name,login_id,last_seen', { count: 'exact' })
    .gt('last_seen', cutoff)
    .order('last_seen', { ascending: false })
    .limit(20);
  if(error){
    renderPresence([], 0);
    return;
  }
  state.presence = Array.isArray(data) ? data : [];
  renderPresence(state.presence, count || state.presence.length);
}

async function refreshChatMessages(){
  if(!(state.currentUser && state.supabaseReady && state.supabase)){
    renderChatMessages([]);
    return;
  }
  const { data, error } = await state.supabase
    .from(SUPABASE_CHAT_TABLE)
    .select('display_name,login_id,message,created_at')
    .order('created_at', { ascending: false })
    .limit(40);
  if(error){
    chatMessages.innerHTML = `<div class="menuHint">채팅을 불러오지 못했습니다.</div>`;
    return;
  }
  const items = (Array.isArray(data) ? data : []).slice().reverse();
  renderChatMessages(items);
}

async function sendChatMessage(){
  if(!(state.currentUser && state.supabaseReady && state.supabase)){
    setAuthStatus('로그인 후 채팅을 사용할 수 있습니다.');
    openMenu('auth');
    return;
  }
  const message = String(chatInput.value || '').trim();
  if(!message) return;
  const ctx = currentOnlineContext();
  const payload = {
    user_id: ctx.userId,
    login_id: ctx.loginId,
    display_name: ctx.name,
    message: message.slice(0, 140),
  };
  const { error } = await state.supabase.from(SUPABASE_CHAT_TABLE).insert(payload);
  if(error){
    showBanner('채팅 전송 실패', 1.2);
    return;
  }
  chatInput.value = '';
  await refreshChatMessages();
}

function startRealtimeSubscriptions(){
  stopRealtimeSubscriptions();
  if(!(state.currentUser && state.supabaseReady && state.supabase)) return;
  state.realtimeChannel = state.supabase
    .channel(`zdf-live-${state.currentUser.userId}`)
    .on('postgres_changes', { event:'*', schema:'public', table:SUPABASE_TABLE }, () => { void refreshLeaderboard(); })
    .on('postgres_changes', { event:'*', schema:'public', table:SUPABASE_PRESENCE_TABLE }, () => { void refreshPresence(); })
    .on('postgres_changes', { event:'*', schema:'public', table:SUPABASE_CHAT_TABLE }, () => { void refreshChatMessages(); })
    .subscribe();
}

function stopRealtimeSubscriptions(){
  if(!(state.realtimeChannel && state.supabase)) return;
  state.supabase.removeChannel(state.realtimeChannel);
  state.realtimeChannel = null;
}

function startOnlineLoops(){
  stopOnlineLoops();
  if(!(state.currentUser && state.supabaseReady && state.supabase)) return;
  void touchPresence(false);
  void refreshPresence();
  void refreshLeaderboard();
  void refreshChatMessages();
  startRealtimeSubscriptions();
  state.presenceTimer = setInterval(() => { void touchPresence(false); void refreshPresence(); }, 30000);
  state.leaderboardTimer = setInterval(() => { void refreshLeaderboard(); }, 45000);
  state.chatTimer = setInterval(() => { void refreshChatMessages(); }, 5000);
}

function stopOnlineLoops(){
  stopRealtimeSubscriptions();
  if(state.presenceTimer){ clearInterval(state.presenceTimer); state.presenceTimer = null; }
  if(state.leaderboardTimer){ clearInterval(state.leaderboardTimer); state.leaderboardTimer = null; }
  if(state.chatTimer){ clearInterval(state.chatTimer); state.chatTimer = null; }
}

function persistProfile(profile){
  const shaped = ensureProfileShape(profile, state.currentUser?.name || 'PLAYER');
  state.profileCache = shaped;
  if(state.currentUser?.provider === 'supabase') queueRemoteProfileSync(shaped);
}

async function applyOnlineUser(user, preferredName='', preferredRecoveryEmail=''){
  const meta = user?.user_metadata || {};
  const loginId = normalizeLoginId(meta.login_id || '');
  const name = normalizeUsername(preferredName || meta.display_name || '') || deriveDisplayName(loginId || '', 'PLAYER');
  const recoveryEmail = normalizeRecoveryEmail(preferredRecoveryEmail || meta.recovery_email || '');
  state.currentUser = {
    key: user.id,
    userId: user.id,
    loginId,
    provider: 'supabase',
    authEmail: user.email || '',
    recoveryEmail,
    privacyAgreedAt: meta.privacy_agreed_at || '',
    name,
  };
  state.profileCache = defaultProfileForUser(state.currentUser);
  updateUserBadge();
  await fetchOnlineProfile(true);
  startOnlineLoops();
  renderMenu('home');
}

async function validateRegisterForm(){
  const loginId = normalizeLoginId(registerIdInput.value || '');

  const displayName = normalizeUsername(registerNameInput.value || '');

  if(!isValidPassword(password)){ setRegisterStatus('비밀번호는 영문 소문자, 숫자, 특수문자만 사용해 6자 이상 입력하세요.'); setAuthStatus('비밀번호는 영문 소문자, 숫자, 특수문자만 사용해 6자 이상 입력하세요.'); return null; }
  if(password !== passwordConfirm){ setRegisterStatus('비밀번호 재확인이 일치하지 않습니다.'); setAuthStatus('비밀번호 재확인이 일치하지 않습니다.'); return null; }
  if(!isValidDisplayName(displayName)){ setRegisterStatus('닉네임은 한글/영어/숫자/특수문자 조합 2~16자이며 공백은 사용할 수 없습니다.'); setAuthStatus('닉네임은 한글/영어/숫자/특수문자 조합 2~16자이며 공백은 사용할 수 없습니다.'); return null; }
  if(!isValidRecoveryEmail(recoveryEmail) || hasInvalidEmailStructure(recoveryEmail)){ setRegisterStatus('이메일 주소 형식이 올바르지 않습니다.'); setAuthStatus('이메일 주소 형식이 올바르지 않습니다.'); return null; }
  setRegisterStatus('이메일 도메인 유효성을 확인하고 있습니다...', false, true);
  const emailDomainReachable = await hasReachableEmailDomain(recoveryEmail);
  if(!emailDomainReachable){
    setRegisterStatus('실제 사용 가능한 이메일 도메인이 아닙니다. 올바른 이메일을 입력하세요.');
    setAuthStatus('실제 사용 가능한 이메일 도메인이 아닙니다. 올바른 이메일을 입력하세요.');
    return null;
  }
  return { loginId, password, displayName, recoveryEmail };
}

async function loginOnlineUser(){
  const loginValue = String(loginIdInput.value || '').trim();
  const pass = String(loginPassInput.value || '');
  const autoLoginEnabled = !!(autoLoginCheck && autoLoginCheck.checked);
  if(state.currentUser && !loginValue && !pass){
    state.authFlowUnlocked = true;
    updateAuthGate();
    setAuthStatus('로그인 버튼을 눌러 시작 화면을 열었습니다.', true);
    openMenu('home');
    showBanner('시작 화면 열림', 1.2);
    return;
  }
  const authEmail = normalizeRecoveryEmail(loginValue);
  if(!loginValue || !pass){
    setAuthStatus('가입한 이메일과 비밀번호를 입력하세요.');
    showBanner('로그인 정보를 입력하세요.', 1.6);
    return;
  }
  if(!initSupabaseClient()) return;
  if(!isValidRecoveryEmail(authEmail)){
    setAuthStatus('로그인은 가입한 이메일 주소로 진행해야 합니다.');
    return;
  }
  if(pass.length < 4){ setAuthStatus('비밀번호를 입력하세요.'); return; }
  try{
    const { data, error } = await state.supabase.auth.signInWithPassword({ email: authEmail, password: pass });
    if(error){
      setAuthStatus(`로그인 실패: ${error.message}`);
      showBanner('로그인 실패', 1.2);
      return;
    }
    let user = data?.user || data?.session?.user || null;
    if(!user){
      const sessionResult = await state.supabase.auth.getSession();
      user = sessionResult?.data?.session?.user || null;
    }
    if(!user){
      setAuthStatus('로그인 세션을 만들지 못했습니다.');
      showBanner('로그인 실패', 1.2);
      return;
    }
    writeAutoLoginPreference(autoLoginEnabled);
    if(autoLoginEnabled) writeSavedLoginCredentials(authEmail, pass);
    else clearSavedLoginCredentials();
    await applyOnlineUser(user);
    state.authFlowUnlocked = true;
    updateAuthGate();
    loginPassInput.value = '';
    setAuthStatus(`${authEmail} 계정으로 로그인했습니다.`, true);
    openMenu('home');
    showBanner('온라인 로그인', 1.2);
  } catch(err){
    const message = err?.message || String(err);
    setAuthStatus(`로그인 실패: ${message}`);
    showBanner('로그인 실패', 1.2);
  }
}

async function registerOnlineUser(form){
  if(state.registerSubmitInFlight) return;
  if(!initSupabaseClient()){
    setRegisterStatus('Supabase 연결을 초기화하지 못했습니다.');
    setAuthStatus('Supabase 연결을 초기화하지 못했습니다.');
    showBanner('서버 연결 실패', 1.4);
    return;
  }
  state.registerSubmitInFlight = true;
  authRegisterBtn.disabled = true;
  const agreedAt = form.privacyAgreedAt || state.registerPolicyAgreedAt || new Date().toISOString();
  const loginId = form.loginId;
  const authEmail = form.recoveryEmail;
  const emailDomainReachable = await hasReachableEmailDomain(authEmail);
  if(!emailDomainReachable){
    setRegisterStatus('실제 사용 가능한 이메일만 회원가입할 수 있습니다.');
    setAuthStatus('실제 사용 가능한 이메일만 회원가입할 수 있습니다.');
    showBanner('회원가입 실패', 1.4);
    state.registerSubmitInFlight = false;
    authRegisterBtn.disabled = false;
    return;
  }
  try{
    const { data, error } = await state.supabase.auth.signUp({
      email: authEmail,
      password: form.password,
      options: {
        data: {
          login_id: loginId,
          display_name: form.displayName,
          recovery_email: form.recoveryEmail,
          privacy_version: privacyPolicyVersion(),
          privacy_agreed_at: agreedAt,
        },
      },
    });
    if(error) throw error;

    const signedUpUser = data?.user || data?.session?.user || null;
    if(signedUpUser){
      state.currentUser = {
        key: signedUpUser.id,
        userId: signedUpUser.id,
        loginId: form.loginId,
        provider: 'supabase',
        authEmail: form.recoveryEmail,
        recoveryEmail: form.recoveryEmail,
        privacyAgreedAt: agreedAt,
        name: form.displayName,
      };
      state.profileCache = ensureProfileShape({
        loginId: form.loginId,
        name: form.displayName,
        recoveryEmail: form.recoveryEmail,
        bestWave: 0,
        bestKills: 0,
        privacyAgreedAt: agreedAt,
        privacyVersion: privacyPolicyVersion(),
      }, form.displayName);
      await pushProfileToSupabase(state.profileCache, currentOnlineContext(), true);
      await state.supabase.auth.signOut();
      state.currentUser = null;
      state.profileCache = null;
      updateUserBadge();
    }

    if(readAutoLoginPreference()) writeSavedLoginCredentials(form.recoveryEmail, form.password);
    else clearSavedLoginCredentials();
    loginIdInput.value = form.recoveryEmail;
    loginPassInput.value = form.password;
    registerIdInput.value = '';
    registerPassInput.value = '';
    if(registerPassConfirmInput) registerPassConfirmInput.value = '';
    registerNameInput.value = '';
    if(registerEmailInput) registerEmailInput.value = '';
    updatePasswordMatchState();

    closePolicyModal();
    closeRegisterModal(false);
    setRegisterStatus('회원가입이 완료되었습니다. 아이디와 닉네임은 프로필 데이터로 저장되었습니다.', true);
    setAuthStatus('회원가입이 완료되었습니다. 가입한 이메일과 비밀번호로 로그인하세요.', true);
    showBanner('회원가입 완료', 1.6);
    resetRegisterConsentState();
    openMenu('auth');
  } catch(err){
    const message = err?.message || String(err);
    const registerMessage = `회원가입 실패: ${message}`;
    setRegisterStatus(registerMessage);
    setAuthStatus(registerMessage);
    showBanner('회원가입 실패', 1.4);
    openRegisterModal(false);
  } finally {
    state.registerSubmitInFlight = false;
    authRegisterBtn.disabled = false;
  }
}

function requestRegisterApproval(){
  if(state.registerSubmitInFlight) return;
  authRegisterBtn.disabled = true;
  setRegisterStatus('회원가입 정보를 확인하고 있습니다...', false, true);
  void (async () => {
    try{
      const form = await validateRegisterForm();
      if(!form) return;
      state.pendingRegisterForm = form;

      if(state.registerSubmitInFlight) return;

      if(state.registerPolicyApproved === true){
        void registerOnlineUser({
          loginId: form.loginId,
          password: form.password,
          displayName: form.displayName,
          recoveryEmail: form.recoveryEmail,
          privacyAgreedAt: state.registerPolicyAgreedAt || new Date().toISOString(),
        });
        return;
      }

      if(state.registerPolicyRejected === true){
        setRegisterStatus('정보 동의가 안되었습니다. 개인정보 정책에 동의해야 가입할 수 있습니다.');
        setAuthStatus('정보 동의가 안되었습니다. 개인정보 정책에 동의해야 가입할 수 있습니다.');
        showBanner('정보 동의가 안되었습니다.', 1.6);
        return;
      }

      openPolicyModal();
      setRegisterStatus('개인정보 정책을 확인하고 거절 또는 동의를 선택하세요.', false, true);
      setAuthStatus('개인정보 정책을 확인하고 거절 또는 동의를 선택하세요.');
      showBanner('개인정보 정책 확인', 1.2);
    } finally {
      if(!state.registerSubmitInFlight) authRegisterBtn.disabled = false;
    }
  })();
}

function approvePolicyAndRegister(){

    setRegisterStatus('정책 창 안의 체크박스를 선택해야 동의할 수 있습니다.');

  if(policyConsentCheck) policyConsentCheck.checked = true;
  closePolicyModal();

async function deleteCurrentAccount(){
  if(!state.currentUser || !state.supabaseReady || !state.supabase) return;
  const agreed = window.confirm('정말 회원탈퇴하시겠습니까? 채팅과 랭킹 기록을 포함한 계정 데이터가 삭제됩니다.');
  if(!agreed) return;
  try{
    await touchPresence(true);
    const { error } = await state.supabase.rpc('delete_my_account');
    if(error) throw error;
    try{ await state.supabase.auth.signOut(); } catch(signOutError){}
    stopOnlineLoops();
    state.currentUser = null;
    state.profileCache = null;
    state.authFlowUnlocked = false;
    updateAuthGate();
    updateUserBadge();
    renderLeaderboard([]);
    renderPresence([], 0);
    renderChatMessages([]);
    closeSidePanels();
    clearSavedLoginCredentials();
    if(autoLoginCheck) autoLoginCheck.checked = false;
    writeAutoLoginPreference(false);
    loginIdInput.value = '';
    loginPassInput.value = '';
    openMenu('auth');

    const message = err?.message || String(err);

function persistUserStats(){

async function hydrateOnlineSession(){

}

function buildDeck(){
  const list = currentList();
  deckTrack.innerHTML = '';
  pageDots.innerHTML = '';
  const totalPages = pageCount();
  state.page = Math.max(0, Math.min(totalPages - 1, state.page));
  for(let page=0; page<totalPages; page++){
    const pageEl = document.createElement('div');
    pageEl.className = 'deckPage';
    const items = list.slice(page * PAGE_SIZE, page * PAGE_SIZE + PAGE_SIZE);
    items.forEach(item => {
      const selected = state.mode === 'install' ? state.selectedInstall === item.key : state.selectedPassive === item.key;
      const owned = state.mode === 'passive' && passiveRank(item.key) > 0;
      const unlocked = state.mode === 'install' ? installUnlocked(item) : passiveUnlocked(item);
      const capped = state.mode === 'install' ? installCapReached(item) : false;
      const costText = owned ? 'OWNED' : (!unlocked ? `W${state.mode === 'install' ? installReqWave(item.key) : passiveReqWave(item.key)}` : '$' + item.cost);
      const metaText = state.mode === 'install'
        ? `T${installTier(item)} · ${familyMeta(item.family)} · 최대${installMaxCount(item.key)}기`
        : `T${passiveTier(item)} · 슬롯${activePassiveCount()}/${passiveSlotLimit()} · ${item.desc}`;
      const card = document.createElement('button');
      const installBlocked = state.mode === 'install' && (!unlocked || capped);
      const metaLockedClass = state.mode === 'install' ? '' : ((!unlocked || capped) ? ' lockInfo' : '');
      card.className = 'card' + (selected ? ' selected' : '') + (!unlocked ? ' locked' : '') + (capped ? ' capped' : '') + (installBlocked ? ' installBlocked' : '');
      card.dataset.key = item.key;
      card.innerHTML = `<canvas class="preview" width="160" height="60"></canvas>
        <div class="name">${item.name}</div>
        <div class="cost">${costText}</div>
        <div class="meta${metaLockedClass}">${metaText}</div>`;
      card.addEventListener('click', () => {
        if(state.mode === 'install') state.selectedInstall = item.key;
        else state.selectedPassive = item.key;
        state.selectedTurretId = null;
        updateDeckSelection();
      });
      if(state.mode === 'install'){
        card.addEventListener('pointerdown', ev => beginInstallDragFromCard(ev, item.key));
        card.addEventListener('touchstart', ev => {
          const touch = ev.changedTouches && ev.changedTouches[0];
          if(!touch) return;
          ev.preventDefault();
          ev.stopPropagation();
          beginInstallDragFromCard(pseudoPointerEventFromTouch(touch, card), item.key, touch.identifier);
        }, { passive:false });
      }
      pageEl.appendChild(card);
      if(state.mode === 'install') drawPreview(card.querySelector('canvas'), item);
      else drawPassivePreview(card.querySelector('canvas'), item, owned);
    });
    deckTrack.appendChild(pageEl);
    const dot = document.createElement('div');
    dot.className = 'dot' + (page === state.page ? ' active' : '');
    dot.addEventListener('click', () => scrollToPage(page));
    pageDots.appendChild(dot);
  }
  updateModeButtons();
  updateSelectedName();
  syncPageUI();
  fitDeckMetaText();
}

function scrollToPage(page){
  state.page = Math.max(0, Math.min(pageCount()-1, page));
  sliderWrap.scrollTo({left: sliderWrap.clientWidth * state.page, behavior:'smooth'});
  syncPageUI();
}

function syncPageUI(){
  const list = currentList();
  const start = state.page * PAGE_SIZE;
  const end = Math.min(list.length, start + PAGE_SIZE);
  pageLabel.textContent = `${state.mode === 'install' ? 'INSTALL' : 'PASSIVE'} ${start+1}-${end} / ${list.length}`;
  [...pageDots.children].forEach((d, i) => d.classList.toggle('active', i === state.page));
}

function drawPreview(cv, item){
  const c = cv.getContext('2d');
  c.clearRect(0,0,cv.width,cv.height);
  c.fillStyle = '#122030'; c.fillRect(0,0,cv.width,cv.height);
  c.fillStyle = 'rgba(255,255,255,.03)';
  for(let x=0;x<cv.width;x+=20){ c.fillRect(x, 0, 1, cv.height); }
  drawInstallModel(c, item, cv.width/2, cv.height/2+4, cv.width*0.66, cv.height*0.68, 1, true);
}

function drawPassivePreview(cv, item, owned){
  const c = cv.getContext('2d');
  c.clearRect(0,0,cv.width,cv.height);
  const g = c.createLinearGradient(0,0,cv.width,cv.height);
  g.addColorStop(0, '#14202e');
  g.addColorStop(1, '#1d1625');
  c.fillStyle = g;
  c.fillRect(0,0,cv.width,cv.height);
  c.strokeStyle = owned ? 'rgba(255,240,170,.85)' : 'rgba(255,255,255,.08)';
  c.strokeRect(1.5,1.5,cv.width-3,cv.height-3);
  const cx = cv.width/2, cy = cv.height/2 + 2;
  c.save();
  c.translate(cx, cy);
  c.fillStyle = item.color;
  c.strokeStyle = 'rgba(255,255,255,.45)';
  c.lineWidth = 2;
  switch(item.icon){
    case 'heart': c.beginPath(); c.moveTo(0,16); c.bezierCurveTo(28,-2,18,-22,0,-8); c.bezierCurveTo(-18,-22,-28,-2,0,16); c.fill(); break;
    case 'battery': c.fillRect(-18,-12,36,24); c.strokeRect(-18,-12,36,24); c.fillRect(18,-6,6,12); break;
    case 'shield': c.beginPath(); c.moveTo(0,-18); c.lineTo(18,-10); c.lineTo(14,14); c.lineTo(0,22); c.lineTo(-14,14); c.lineTo(-18,-10); c.closePath(); c.fill(); break;
    case 'wall': c.fillRect(-20,-6,40,20); c.fillStyle='rgba(255,255,255,.35)'; c.fillRect(-14,-2,8,8); c.fillRect(-2,-2,8,8); c.fillRect(10,-2,8,8); break;
    case 'plus': c.fillRect(-6,-18,12,36); c.fillRect(-18,-6,36,12); break;
    case 'cross': c.fillRect(-5,-16,10,32); c.fillRect(-16,-5,32,10); c.strokeRect(-16,-5,32,10); break;
    case 'spark': c.beginPath(); c.moveTo(-12,10); c.lineTo(-2,-4); c.lineTo(-10,-4); c.lineTo(12,-18); c.lineTo(2,-2); c.lineTo(10,-2); c.closePath(); c.fill(); break;
    case 'fang': c.beginPath(); c.arc(0,0,17,0,Math.PI*2); c.fill(); c.fillStyle='#201922'; c.beginPath(); c.moveTo(-8,0); c.lineTo(-2,16); c.lineTo(2,0); c.lineTo(8,16); c.lineTo(10,0); c.closePath(); c.fill(); break;
    case 'burst': for(let i=0;i<8;i++){ c.save(); c.rotate(i*Math.PI/4); c.fillRect(-3,-24,6,14); c.restore(); } c.beginPath(); c.arc(0,0,11,0,Math.PI*2); c.fill(); break;
    case 'bolt': c.beginPath(); c.moveTo(-4,-20); c.lineTo(10,-20); c.lineTo(1,-2); c.lineTo(12,-2); c.lineTo(-10,22); c.lineTo(-2,4); c.lineTo(-12,4); c.closePath(); c.fill(); break;
    case 'sun': c.beginPath(); c.arc(0,0,12,0,Math.PI*2); c.fill(); for(let i=0;i<8;i++){ c.save(); c.rotate(i*Math.PI/4); c.fillRect(-2,-24,4,8); c.restore(); } break;
    case 'gate': c.strokeStyle=item.color; c.lineWidth=4; c.strokeRect(-17,-14,34,28); c.beginPath(); c.moveTo(0,-14); c.lineTo(0,14); c.stroke(); break;
    case 'lock': c.strokeStyle=item.color; c.lineWidth=4; c.strokeRect(-12,-2,24,18); c.beginPath(); c.arc(0,-4,10,Math.PI,0); c.stroke(); break;
    case 'wave': for(let i=0;i<3;i++){ c.beginPath(); c.arc(0,0,8+i*7,Math.PI*0.12,Math.PI*0.88); c.stroke(); } break;
    case 'zap': c.beginPath(); c.moveTo(-18,4); c.lineTo(-6,-4); c.lineTo(-2,4); c.lineTo(8,-6); c.lineTo(18,2); c.stroke(); break;
    case 'snow': for(let i=0;i<3;i++){ c.save(); c.rotate(i*Math.PI/3); c.fillRect(-2,-18,4,36); c.restore(); } break;
    case 'coin': c.beginPath(); c.arc(0,0,16,0,Math.PI*2); c.fill(); c.fillStyle='#473500'; c.font='bold 14px sans-serif'; c.textAlign='center'; c.textBaseline='middle'; c.fillText('$',0,1); break;
    case 'crown': c.beginPath(); c.moveTo(-18,10); c.lineTo(-10,-10); c.lineTo(0,0); c.lineTo(10,-10); c.lineTo(18,10); c.closePath(); c.fill(); break;
    case 'sword': c.fillRect(-3,-20,6,26); c.fillRect(-12,2,24,5); c.beginPath(); c.moveTo(0,-24); c.lineTo(8,-10); c.lineTo(-8,-10); c.closePath(); c.fill(); break;
    case 'flame': c.beginPath(); c.moveTo(0,-20); c.bezierCurveTo(18,-8,15,12,0,20); c.bezierCurveTo(-16,10,-18,-8,0,-20); c.fill(); break;
    default: c.beginPath(); c.arc(0,0,16,0,Math.PI*2); c.fill(); break;
  }
  c.restore();
}

function resize(){
    const prevField = {...state.field};
    const rect = fieldWrap.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    const w = rect.width, h = rect.height;
    const isTablet = window.matchMedia('(min-width: 768px)').matches;
    const isDesktop = window.matchMedia('(min-width: 1100px)').matches;
    const padX = isDesktop ? Math.max(36, Math.floor(w * 0.07)) : (isTablet ? Math.max(26, Math.floor(w * 0.06)) : Math.max(16, Math.floor(w * 0.05)));
    const padTop = isDesktop ? 42 : (isTablet ? 38 : 32);
    const padBottom = isDesktop ? 46 : (isTablet ? 42 : 38);
    state.field.left = padX;
    state.field.top = padTop;
    state.field.width = Math.max(120, w - padX * 2);
    state.field.height = Math.max(180, h - padTop - padBottom);
    state.field.baseY = state.field.top + state.field.height - 10;
    state.field.tileW = state.field.width / state.field.cols;
    state.field.tileH = state.field.height / state.field.rows;

    for(const t of state.turrets){
      const p = gridCenter(t.col, t.row);
      t.x = p.x;
      t.y = p.y;
    }

    const prevTop = prevField.top || 0;
    const prevHeight = Math.max(1, prevField.height || 1);
    for(const e of state.enemies){
      e.x = state.field.left + state.field.tileW * (e.col + 0.5);
      const progress = (e.y - prevTop) / prevHeight;
      e.y = state.field.top + progress * state.field.height;
    }

    state.supportDirty = true;
    syncPageUI();
    fitDeckMetaText();
  }

  function gridCenter(col,row){
    return {x: state.field.left + state.field.tileW * (col + 0.5), y: state.field.top + state.field.tileH * (row + 0.5)};
  }

  function tileAt(x,y){
    const f = state.field;
    if(x < f.left || x > f.left + f.width || y < f.top || y > f.top + f.height) return null;
    const col = Math.max(0, Math.min(f.cols-1, Math.floor((x - f.left) / f.tileW)));
    const row = Math.max(0, Math.min(f.rows-1, Math.floor((y - f.top) / f.tileH)));
    return {col,row};
  }

  function pointerPos(ev){
    const r = canvas.getBoundingClientRect();
    return {x:ev.clientX - r.left, y:ev.clientY - r.top};
  }

  function clearInstallDragState(){
    state.dragInstallActive = false;
    state.dragInstallTile = null;
    state.dragInstallPointerId = null;
    state.dragInstallStartX = 0;
    state.dragInstallStartY = 0;
    state.dragInstallMoved = false;
    state.dragInstallCardKey = '';
    state.dragInstallTouchId = null;
    if(installDragBadge) installDragBadge.classList.remove('open');
    if(sliderWrap) sliderWrap.classList.remove('dragLock');
  }

  function updateInstallDragBadge(ev){
    if(!installDragBadge) return;
    if(!state.dragInstallActive){
      installDragBadge.classList.remove('open');
      return;
    }
    installDragBadge.style.left = Math.round(ev.clientX) + 'px';
    installDragBadge.style.top = Math.round(ev.clientY - 16) + 'px';
    const item = getInstall(state.dragInstallCardKey || state.selectedInstall);
    installDragBadge.textContent = `${item.name} 설치`;
    installDragBadge.classList.add('open');
  }

  function pseudoPointerEventFromTouch(touch, currentTarget=null){
    return {
      clientX: touch?.clientX || 0,
      clientY: touch?.clientY || 0,
      pointerId: null,
      button: 0,
      currentTarget,
      preventDefault(){},
      stopPropagation(){},
    };
  }

  function findTouchByIdentifier(list, identifier){
    if(!list || identifier == null) return null;
    for(const t of list){
      if(t.identifier === identifier) return t;
    }
    return null;
  }

  function beginInstallDragFromCard(ev, key='', touchId=null){
    if(state.mode !== 'install') return;
    if(ev.button !== undefined && ev.button !== 0) return;
    ev.preventDefault();
    ev.stopPropagation();
    const picked = getInstall(key || state.selectedInstall);
    if(!picked) return;
    state.selectedInstall = picked.key;
    updateDeckSelection();
    state.dragInstallActive = true;
    state.dragInstallPointerId = Number.isFinite(ev.pointerId) ? ev.pointerId : null;
    state.dragInstallTile = tileAt(pointerPos(ev).x, pointerPos(ev).y);
    state.dragInstallStartX = ev.clientX;
    state.dragInstallStartY = ev.clientY;
    state.dragInstallMoved = false;
    state.dragInstallCardKey = picked.key;
    state.dragInstallTouchId = touchId;
    if(sliderWrap) sliderWrap.classList.add('dragLock');
    const target = ev.currentTarget;
    if(target && typeof target.setPointerCapture === 'function' && Number.isFinite(ev.pointerId)){
      try{ target.setPointerCapture(ev.pointerId); } catch(err){}
    }
    updateInstallDragBadge(ev);
  }

  function updateInstallDrag(ev){
    if(!state.dragInstallActive) return;
    if(Number.isFinite(state.dragInstallPointerId) && Number.isFinite(ev.pointerId) && state.dragInstallPointerId !== ev.pointerId) return;
    const p = pointerPos(ev);
    const movedDist = Math.hypot(ev.clientX - state.dragInstallStartX, ev.clientY - state.dragInstallStartY);
    if(movedDist >= 8) state.dragInstallMoved = true;
    state.dragInstallTile = tileAt(p.x, p.y);
    updateInstallDragBadge(ev);
  }

  function endInstallDrag(ev){
    if(!state.dragInstallActive) return;
    if(Number.isFinite(state.dragInstallPointerId) && Number.isFinite(ev.pointerId) && state.dragInstallPointerId !== ev.pointerId) return;
    ev.preventDefault();
    const p = pointerPos(ev);
    const tile = tileAt(p.x, p.y) || state.dragInstallTile;
    const moved = state.dragInstallMoved;
    const draggedKey = state.dragInstallCardKey || state.selectedInstall;
    if(Number.isFinite(ev.pointerId) && canvas.releasePointerCapture){
      try{ canvas.releasePointerCapture(ev.pointerId); } catch(err){}
    }
    clearInstallDragState();
    if(!tile) return;
    if(!moved){
      const occupied = state.turrets.find(t => t.col === tile.col && t.row === tile.row);
      if(occupied){
        selectTurret(occupied.id);
        return;
      }
      if(draggedKey) showBanner('하단 카드에서 전장으로 드래그해 설치하세요.', 1.0);
      return;
    }
    if(draggedKey) state.selectedInstall = draggedKey;
    place(tile.col, tile.row);
  }

  function selectTurret(id){ state.selectedTurretId = id; refreshActionBar(); }
  function getSelectedTurret(){ return state.turrets.find(t => t.id === state.selectedTurretId) || null; }


function refreshActionBar(){
  if(state.mode === 'passive'){
    const p = getPassive(state.selectedPassive);
    const owned = passiveRank(p.key) > 0;
    const unlocked = passiveUnlocked(p);
    const slotFull = !owned && activePassiveCount() >= passiveSlotLimit();
    setActionInfo(`${p.name} · ${p.desc} · ${passiveRestrictionText(p)} · ${owned ? '구매 완료' : '구매 비용 $' + p.cost}`);
    upgradeBtn.textContent = '구매';
    sellBtn.textContent = owned ? '보유중' : '미보유';
    upgradeBtn.disabled = owned || !unlocked || slotFull || state.gold < p.cost;
    sellBtn.disabled = true;
    return;
  }
  upgradeBtn.textContent = '업그레이드';
