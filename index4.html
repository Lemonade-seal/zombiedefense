<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>Zombie Defense Fixed Frame Slider Models</title>
<style>
  :root{
    --bg:#11161f; --panel:#1a2230; --panel2:#0f141d; --line:#2b3648; --text:#e7eefb; --muted:#9fb0cb;
    --accent:#4bd08a; --warn:#ffce57; --danger:#ff6b6b; --blue:#72b3ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;overflow:hidden}
  body{
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    display:flex;
    justify-content:center;
    align-items:stretch;
    background:
      radial-gradient(circle at top, rgba(70,104,158,.20), transparent 42%),
      linear-gradient(180deg,#0b1017,#141c29 44%,#0f141d);
  }
  #app{
    width:100%;
    height:100%;
    display:grid;
    grid-template-rows:auto 1fr auto;
    gap:0;
    background:linear-gradient(180deg,#0d1219,#151c28);
  }
  .topbar{display:grid;grid-template-columns:1fr auto;gap:8px;padding:8px 10px;border-bottom:1px solid var(--line);background:rgba(15,20,29,.95)}
  .stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:7px 8px;min-width:0}
  .label{font-size:10px;letter-spacing:.08em;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .value{font-size:15px;font-weight:800;line-height:1.1;margin-top:2px;white-space:nowrap}
  .controls{display:flex;gap:6px;align-items:stretch;flex-wrap:wrap;justify-content:flex-end}
  button{position:relative;overflow:hidden;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:12px;padding:0 12px;font-weight:800;font-size:13px;min-height:42px;transition:transform .08s ease, box-shadow .14s ease, filter .16s ease}
  button:active{transform:translateY(1px) scale(.992);filter:brightness(1.06)}
  button.flashPulse{box-shadow:0 0 0 1px rgba(255,255,255,.22),0 0 18px rgba(255,255,255,.16),0 0 26px rgba(115,185,255,.18)}
  .tapFlash{position:absolute;left:0;top:0;width:18px;height:18px;border-radius:999px;pointer-events:none;transform:translate(-50%,-50%) scale(.2);background:radial-gradient(circle, rgba(255,255,255,.96) 0%, rgba(187,228,255,.85) 28%, rgba(120,190,255,.42) 56%, rgba(120,190,255,0) 78%);mix-blend-mode:screen;animation:tapFlash .46s ease-out forwards}
  @keyframes tapFlash{0%{opacity:.95;transform:translate(-50%,-50%) scale(.2)}55%{opacity:.72}100%{opacity:0;transform:translate(-50%,-50%) scale(9)}}
  button.primary{background:#163224;border-color:#27533c;color:#c8ffe1}
  button.warn{background:#372712;border-color:#5e4321;color:#ffe5a1}
  button.small{min-height:34px;padding:0 10px;font-size:12px;border-radius:10px}
  button:disabled{opacity:.45}
  #fieldWrap{position:relative;min-height:0;background:#0c1118}
  #game{display:block;width:100%;height:100%}
  .msg{position:absolute;left:12px;right:12px;top:10px;pointer-events:none;display:flex;justify-content:center}
  #banner{display:none;background:rgba(8,12,18,.34);border:1px solid rgba(120,140,170,.32);border-radius:12px;padding:8px 12px;font-size:13px;font-weight:800;backdrop-filter:blur(3px);max-width:92%;text-align:center;opacity:0;transition:opacity .22s ease}
  .bottombar{padding:8px 10px 10px;border-top:1px solid var(--line);background:rgba(15,20,29,.98);display:grid;gap:8px;grid-template-rows:34px 116px 42px}
  .caption{display:grid;grid-template-columns:1fr auto;align-items:center;color:var(--muted);font-size:11px;font-weight:700;padding:0 2px;gap:8px;min-height:34px}
  .captionRight{display:flex;gap:8px;align-items:center}
  .dots{display:flex;gap:5px;align-items:center}
  .seg{display:flex;gap:6px;align-items:center}
  .seg .tab{min-height:30px;padding:0 10px;font-size:11px;border-radius:10px}
  .dot{width:8px;height:8px;border-radius:999px;background:#334157;border:1px solid #495872}
  .dot.active{background:#81c3ff}
  .sliderWrap{height:116px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-radius:14px}
  .sliderWrap::-webkit-scrollbar{display:none}
  .track{display:flex;gap:8px;height:100%}
  .deckPage{flex:0 0 100%;height:100%;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;scroll-snap-align:start}
  .card{height:116px;background:linear-gradient(180deg,#1d2736,#161d29);border:1px solid #2a3648;border-radius:14px;padding:7px 6px;display:grid;grid-template-rows:38px 24px 14px 12px;gap:4px;box-shadow:0 6px 14px rgba(0,0,0,.15);overflow:hidden}
  .card.selected{border-color:#78c3ff;box-shadow:inset 0 0 0 2px rgba(120,195,255,.85)}
  .preview{width:100%;height:38px;border-radius:10px;background:linear-gradient(180deg,#101720,#172131);border:1px solid rgba(255,255,255,.06)}
  .name{font-size:10px;line-height:1.1;font-weight:800;height:24px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .cost{font-size:11px;color:#ffe08f;font-weight:900}
  .meta{font-size:10px;color:#9ec2ff;height:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .actionbar{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;min-height:42px}
  .actionInfo{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:7px 10px;font-size:11px;color:var(--muted);height:42px;display:flex;align-items:center;overflow:hidden;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .footerHint{display:none}
  @media (max-width:640px){
    .topbar{grid-template-columns:1fr}
    .controls{justify-content:stretch}
    .controls button{flex:1 1 0}
    .stat{padding:6px 7px}
    .value{font-size:14px}
    .deckPage{gap:6px}
    .card{height:116px;padding:6px 5px}
    .actionbar{grid-template-columns:1fr auto auto}
    .preview{height:34px}
  }
  @media (min-width:768px){
    body{padding:12px}
    #app{
      height:calc(100vh - 24px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      max-width:1180px;
      border:1px solid rgba(95,114,145,.34);
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,.32);
    }
    .topbar{padding:12px 14px;gap:12px}
    .stats{gap:10px}
    .stat{padding:9px 10px;border-radius:14px}
    .label{font-size:11px}
    .value{font-size:18px}
    .controls{gap:8px}
    button{font-size:14px;min-height:46px;padding:0 16px}
    button.small{min-height:38px;font-size:12px}
    #banner{font-size:14px;padding:9px 14px}
    .bottombar{padding:10px 14px 14px;grid-template-rows:36px 124px 44px;gap:10px}
    .caption,.actionbar,.sliderWrap{width:100%;max-width:1060px;margin:0 auto}
    .caption{font-size:12px}
    .sliderWrap{height:124px}
    .deckPage{gap:10px}
    .card{height:124px;padding:8px 7px;grid-template-rows:42px 26px 15px 12px}
    .preview{height:42px}
    .name{font-size:11px;height:26px}
    .cost{font-size:12px}
    .actionInfo{height:44px;font-size:12px}
  }
  @media (min-width:1100px){
    body{padding:16px}
    #app{
      height:calc(100vh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      max-width:1420px;
      border-radius:24px;
    }
    .topbar{padding:14px 18px}
    .stats{grid-template-columns:repeat(5,minmax(120px,1fr))}
    .value{font-size:20px}
    .controls button{min-width:110px}
    .bottombar{padding:12px 18px 18px;grid-template-rows:38px 132px 46px}
    .caption,.actionbar,.sliderWrap{max-width:1220px}
    .sliderWrap{height:132px}
    .card{height:132px}
    #banner{font-size:15px;padding:10px 16px}
  }
</style>
</head>

function getInstall(key){ return installMap[key] || INSTALLS[0]; }
function getPassive(key){ return passiveMap[key] || PASSIVES[0]; }
function currentList(){ return state.mode === 'install' ? INSTALLS : PASSIVES; }
function pageCount(){ return Math.max(1, Math.ceil(currentList().length / PAGE_SIZE)); }
function passiveRank(key){ return state.passives[key] || 0; }
function hasPassive(key){ return passiveRank(key) > 0; }
function nowSec(){ return performance.now() / 1000; }
function energyMaxValue(){
  let max = 100;
  if(hasPassive('core_cell')) max += 25;
  if(hasPassive('fortress_cell')) max += 40;
  return max;
}
function clampEnergy(){ state.energy = Math.max(0, Math.min(energyMaxValue(), state.energy)); }
function healEnergy(amount){ if(amount <= 0) return 0; const prev = state.energy; state.energy = Math.min(energyMaxValue(), state.energy + amount); return state.energy - prev; }
function addDamageBuff(mult, duration, label=''){
  state.damageBuffs.push({mul:mult, until:nowSec() + duration, label});
  if(label) showBanner(label, 1.1);
}
function activeDamageBuffMul(){
  const now = nowSec();
  state.damageBuffs = state.damageBuffs.filter(b => b.until > now);
  let mul = 1;
  for(const b of state.damageBuffs) mul *= b.mul;
  return mul;
}
function passiveDamageMul(){
  const max = energyMaxValue();
  let mul = activeDamageBuffMul();
  if(hasPassive('redline_drive') && state.energy <= max * 0.40) mul *= 1.18;
  if(hasPassive('overflow_drive') && state.energy >= max * 0.90) mul *= 1.15;
  if(hasPassive('last_stand_amp')) mul *= 1 + Math.min(0.24, Math.floor((max - state.energy) / 10) * 0.03);
  return mul;
}
function passiveFireFactor(){
  const max = energyMaxValue();
  let factor = 1;
  if(hasPassive('redline_drive') && state.energy <= max * 0.40) factor *= 0.88;
  return factor;
}
function baseDamageFlatReduction(){
  let value = 0;
  if(hasPassive('plated_hull')) value += 1.2;
  if(hasPassive('guardian_shell')) value += 2.2;

}
function energyRegenPerSec(){

function upgradeDeltaText(item, nextLevel){
  if(nextLevel > 3) return '최대 레벨';
  const parts = [];
  if(nextLevel === 2){
    parts.push('화력 강화');
    if(item.family === 'projectile' || item.family === 'bunker') parts.push('연사 향상');
    if(['splash','beam','chain'].includes(item.family)) parts.push('사거리 강화');
    if(item.family === 'gold') parts.push('수익 증가');
    if(item.family === 'heal') parts.push('회복 증가');
    if(item.family.startsWith('support_')) parts.push('보조 범위 증가');
    if(['wall','bunker'].includes(item.family)) parts.push('내구 보강');
  }
  if(nextLevel === 3){
    if(['rifle','smg','burst','shotgun','laser','rail','cannon','mortar','rocket','bunker','acid','frost','drone'].includes(item.model)) parts.push('탄 수 증가');
    if(['shock','tesla','chain'].includes(item.model)) parts.push('추가 타격');
    if(['cannon','mortar','rocket','mine'].includes(item.model)) parts.push('폭발 강화');
    if(['wall','bunker'].includes(item.family)) parts.push('요새화');
    if(item.family === 'gold') parts.push('생산 가속');
    if(item.family === 'heal') parts.push('광역 수리');
    if(item.family.startsWith('support_')) parts.push('강화 효율 증가');
  }
  return parts.join(' · ') || '기본 성능 향상';
}

  function turretTotalSpent(t){ return t.spent || t.base.cost; }
  function getUpgradeCost(t){
    if(!t || t.level >= 3) return 0;
    const cost = t.base.cost || 0;
    const premium = cost >= 170 ? 0.48 : cost >= 140 ? 0.36 : cost >= 110 ? 0.26 : cost >= 85 ? 0.16 : cost >= 60 ? 0.08 : 0;
    if(t.level === 1) return Math.round(cost * (1.08 + premium));
    if(t.level === 2) return Math.round(cost * (1.92 + premium * 1.25));
    return 0;
  }

function buildDeck(){
  const list = currentList();
  deckTrack.innerHTML = '';
  pageDots.innerHTML = '';
  const totalPages = pageCount();
  state.page = Math.max(0, Math.min(totalPages - 1, state.page));
  for(let page=0; page<totalPages; page++){
    const pageEl = document.createElement('div');
    pageEl.className = 'deckPage';
    const items = list.slice(page * PAGE_SIZE, page * PAGE_SIZE + PAGE_SIZE);
    items.forEach(item => {
      const selected = state.mode === 'install' ? state.selectedInstall === item.key : state.selectedPassive === item.key;
      const owned = state.mode === 'passive' && passiveRank(item.key) > 0;
      const card = document.createElement('button');
      card.className = 'card' + (selected ? ' selected' : '');
      card.innerHTML = `<canvas class="preview" width="160" height="60"></canvas>
        <div class="name">${item.name}</div>
        <div class="cost">${owned ? 'OWNED' : '$' + item.cost}</div>
        <div class="meta">${state.mode === 'install' ? familyMeta(item.family) : item.desc}</div>`;
      card.addEventListener('click', () => {
        if(state.mode === 'install') state.selectedInstall = item.key;
        else state.selectedPassive = item.key;
        state.selectedTurretId = null;
        updateSelectedName();
        refreshActionBar();
        buildDeck();
      });
      pageEl.appendChild(card);
      if(state.mode === 'install') drawPreview(card.querySelector('canvas'), item);
      else drawPassivePreview(card.querySelector('canvas'), item, owned);
    });
    deckTrack.appendChild(pageEl);
    const dot = document.createElement('div');
    dot.className = 'dot' + (page === state.page ? ' active' : '');
    dot.addEventListener('click', () => scrollToPage(page));
    pageDots.appendChild(dot);
  }
  updateModeButtons();
  updateSelectedName();
  syncPageUI();
}

function scrollToPage(page){
  state.page = Math.max(0, Math.min(pageCount()-1, page));
  sliderWrap.scrollTo({left: sliderWrap.clientWidth * state.page, behavior:'smooth'});
  syncPageUI();
}

function syncPageUI(){
  const list = currentList();
  const start = state.page * PAGE_SIZE;
  const end = Math.min(list.length, start + PAGE_SIZE);
  pageLabel.textContent = `${state.mode === 'install' ? 'INSTALL' : 'PASSIVE'} ${start+1}-${end} / ${list.length}`;

}

function drawPassivePreview(cv, item, owned){
  const c = cv.getContext('2d');
  c.clearRect(0,0,cv.width,cv.height);
  const g = c.createLinearGradient(0,0,cv.width,cv.height);
  g.addColorStop(0, '#14202e');
  g.addColorStop(1, '#1d1625');
  c.fillStyle = g;
  c.fillRect(0,0,cv.width,cv.height);
  c.strokeStyle = owned ? 'rgba(255,240,170,.85)' : 'rgba(255,255,255,.08)';
  c.strokeRect(1.5,1.5,cv.width-3,cv.height-3);
  const cx = cv.width/2, cy = cv.height/2 + 2;
  c.save();
  c.translate(cx, cy);
  c.fillStyle = item.color;
  c.strokeStyle = 'rgba(255,255,255,.45)';
  c.lineWidth = 2;
  switch(item.icon){
    case 'heart': c.beginPath(); c.moveTo(0,16); c.bezierCurveTo(28,-2,18,-22,0,-8); c.bezierCurveTo(-18,-22,-28,-2,0,16); c.fill(); break;
    case 'battery': c.fillRect(-18,-12,36,24); c.strokeRect(-18,-12,36,24); c.fillRect(18,-6,6,12); break;
    case 'shield': c.beginPath(); c.moveTo(0,-18); c.lineTo(18,-10); c.lineTo(14,14); c.lineTo(0,22); c.lineTo(-14,14); c.lineTo(-18,-10); c.closePath(); c.fill(); break;
    case 'wall': c.fillRect(-20,-6,40,20); c.fillStyle='rgba(255,255,255,.35)'; c.fillRect(-14,-2,8,8); c.fillRect(-2,-2,8,8); c.fillRect(10,-2,8,8); break;
    case 'plus': c.fillRect(-6,-18,12,36); c.fillRect(-18,-6,36,12); break;
    case 'cross': c.fillRect(-5,-16,10,32); c.fillRect(-16,-5,32,10); c.strokeRect(-16,-5,32,10); break;
    case 'spark': c.beginPath(); c.moveTo(-12,10); c.lineTo(-2,-4); c.lineTo(-10,-4); c.lineTo(12,-18); c.lineTo(2,-2); c.lineTo(10,-2); c.closePath(); c.fill(); break;
    case 'fang': c.beginPath(); c.arc(0,0,17,0,Math.PI*2); c.fill(); c.fillStyle='#201922'; c.beginPath(); c.moveTo(-8,0); c.lineTo(-2,16); c.lineTo(2,0); c.lineTo(8,16); c.lineTo(10,0); c.closePath(); c.fill(); break;
    case 'burst': for(let i=0;i<8;i++){ c.save(); c.rotate(i*Math.PI/4); c.fillRect(-3,-24,6,14); c.restore(); } c.beginPath(); c.arc(0,0,11,0,Math.PI*2); c.fill(); break;
    case 'bolt': c.beginPath(); c.moveTo(-4,-20); c.lineTo(10,-20); c.lineTo(1,-2); c.lineTo(12,-2); c.lineTo(-10,22); c.lineTo(-2,4); c.lineTo(-12,4); c.closePath(); c.fill(); break;
    case 'sun': c.beginPath(); c.arc(0,0,12,0,Math.PI*2); c.fill(); for(let i=0;i<8;i++){ c.save(); c.rotate(i*Math.PI/4); c.fillRect(-2,-24,4,8); c.restore(); } break;
    case 'gate': c.strokeStyle=item.color; c.lineWidth=4; c.strokeRect(-17,-14,34,28); c.beginPath(); c.moveTo(0,-14); c.lineTo(0,14); c.stroke(); break;
    case 'lock': c.strokeStyle=item.color; c.lineWidth=4; c.strokeRect(-12,-2,24,18); c.beginPath(); c.arc(0,-4,10,Math.PI,0); c.stroke(); break;
    case 'wave': for(let i=0;i<3;i++){ c.beginPath(); c.arc(0,0,8+i*7,Math.PI*0.12,Math.PI*0.88); c.stroke(); } break;
    case 'zap': c.beginPath(); c.moveTo(-18,4); c.lineTo(-6,-4); c.lineTo(-2,4); c.lineTo(8,-6); c.lineTo(18,2); c.stroke(); break;
    case 'snow': for(let i=0;i<3;i++){ c.save(); c.rotate(i*Math.PI/3); c.fillRect(-2,-18,4,36); c.restore(); } break;
    case 'coin': c.beginPath(); c.arc(0,0,16,0,Math.PI*2); c.fill(); c.fillStyle='#473500'; c.font='bold 14px sans-serif'; c.textAlign='center'; c.textBaseline='middle'; c.fillText('$',0,1); break;
    case 'crown': c.beginPath(); c.moveTo(-18,10); c.lineTo(-10,-10); c.lineTo(0,0); c.lineTo(10,-10); c.lineTo(18,10); c.closePath(); c.fill(); break;
    case 'sword': c.fillRect(-3,-20,6,26); c.fillRect(-12,2,24,5); c.beginPath(); c.moveTo(0,-24); c.lineTo(8,-10); c.lineTo(-8,-10); c.closePath(); c.fill(); break;

function resize(){

    const rect = fieldWrap.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    const w = rect.width, h = rect.height;
    const isTablet = window.matchMedia('(min-width: 768px)').matches;
    const isDesktop = window.matchMedia('(min-width: 1100px)').matches;
    const padX = isDesktop ? Math.max(36, Math.floor(w * 0.07)) : (isTablet ? Math.max(26, Math.floor(w * 0.06)) : Math.max(16, Math.floor(w * 0.05)));
    const padTop = isDesktop ? 42 : (isTablet ? 38 : 32);
    const padBottom = isDesktop ? 46 : (isTablet ? 42 : 38);
    state.field.left = padX;
    state.field.top = padTop;
    state.field.width = Math.max(120, w - padX * 2);
    state.field.height = Math.max(180, h - padTop - padBottom);
    state.field.baseY = state.field.top + state.field.height - 10;
    state.field.tileW = state.field.width / state.field.cols;
    state.field.tileH = state.field.height / state.field.rows;
    syncPageUI();
  }

  function gridCenter(col,row){
    return {x: state.field.left + state.field.tileW * (col + 0.5), y: state.field.top + state.field.tileH * (row + 0.5)};
  }

  function tileAt(x,y){
    const f = state.field;
    if(x < f.left || x > f.left + f.width || y < f.top || y > f.top + f.height) return null;
    const col = Math.max(0, Math.min(f.cols-1, Math.floor((x - f.left) / f.tileW)));
    const row = Math.max(0, Math.min(f.rows-1, Math.floor((y - f.top) / f.tileH)));
    return {col,row};
  }

  function pointerPos(ev){
    const r = canvas.getBoundingClientRect();
    const t = ev.touches && ev.touches[0] ? ev.touches[0] : ev;
    return {x:t.clientX - r.left, y:t.clientY - r.top};
  }

  function selectTurret(id){ state.selectedTurretId = id; refreshActionBar(); }
  function getSelectedTurret(){ return state.turrets.find(t => t.id === state.selectedTurretId) || null; }


function refreshActionBar(){
  if(state.mode === 'passive'){
    const p = getPassive(state.selectedPassive);
    const owned = passiveRank(p.key) > 0;
    actionInfo.textContent = `${p.name} · ${p.desc} · ${owned ? '구매 완료' : '구매 비용 $' + p.cost}`;
    upgradeBtn.textContent = '구매';
    sellBtn.textContent = owned ? '보유중' : '미보유';
    upgradeBtn.disabled = owned || state.gold < p.cost;
    sellBtn.disabled = true;
    return;
  }
  upgradeBtn.textContent = '업그레이드';
  sellBtn.textContent = '판매';
  const t = getSelectedTurret();
  if(!t){
    actionInfo.textContent = '전장에 설치물을 터치하면 레벨, 업그레이드 비용, 판매 금액이 표시됩니다.';
    upgradeBtn.disabled = true; sellBtn.disabled = true; return;
  }
  const sell = Math.round(turretTotalSpent(t) * 0.65);
  const up = getUpgradeCost(t);
  const next = up ? upgradeDeltaText(t.base, t.level + 1) : '최대 레벨';
  actionInfo.textContent = `${t.base.name} · Lv.${t.level} · HP ${Math.round(t.hp)}/${Math.round(t.maxHp)} · 다음: ${next} · 업그레이드 ${up ? '$'+up : '최대'} · 판매 $${sell}`;
  upgradeBtn.disabled = !up || state.gold < up;
  sellBtn.disabled = false;
}


  function makeTurret(item,col,row){

      state.effects.push({type:'muzzle', x:t.x, y:t.y-8, r:12, life:0.10, color:item.color});
      state.effects.push({type:'aura', x:t.x, y:t.y, r:stats.range * 0.45, life:0.14, color:item.color});
      return;
    }
    if(item.family === 'beam'){
      applyDamage(target, stats.damage, {});
      state.effects.push({type:'muzzle', x:t.x, y:t.y-8, r:13, life:0.10, color:item.color});
      state.effects.push({type:'beam', x1:t.x, y1:t.y-8, x2:target.x, y2:target.y, life:0.14, color:item.color});
      state.effects.push({type:'impactFlash', x:target.x, y:target.y, r:8, life:0.10, color:item.color});
      return;
    }
    if(item.family === 'chain'){
      const victims = [target]; let pivot = target;
      for(let i=0;i<stats.chain;i++){
        let next = null, bestDist = 999999;
        for(const e of state.enemies){ if(victims.includes(e)) continue; const d = Math.hypot(e.x-pivot.x,e.y-pivot.y); if(d < 76 && d < bestDist){bestDist=d; next=e;} }
        if(next){ victims.push(next); pivot = next; }
      }
      for(const v of victims) applyDamage(v, stats.damage, {slow:item.key === 'shock' ? 0.86 : 0, slowTime:0.5});
      state.effects.push({type:'muzzle', x:t.x, y:t.y-8, r:11, life:0.09, color:item.color});
      state.effects.push({type:'chain', points:victims.map(v=>({x:v.x,y:v.y})), x1:t.x, y1:t.y-8, life:0.14, color:item.color});
      return;
    }

    const shots = stats.shots || 1;
    for(let s=0; s<shots; s++){
      const spread = shots > 1 ? (s - (shots-1)/2) * (stats.spreadArc || 0.10) : 0;
      const angle = Math.atan2(target.y - t.y, target.x - t.x) + spread;
      state.bullets.push({x:t.x, y:t.y-8, vx:Math.cos(angle)*stats.bulletSpeed, vy:Math.sin(angle)*stats.bulletSpeed, damage:stats.damage, splash:item.family === 'splash' ? stats.splash : 0, poison:stats.poison || 0, slow:stats.slow || 0, slowTime:stats.slowTime || 1.6, color:item.color, life:1.2});
      state.effects.push({type:'muzzle', x:t.x + Math.cos(angle) * 4, y:t.y - 8 + Math.sin(angle) * 4, r:item.family === 'splash' ? 9 : 6, life:0.08, color:item.color});
    }
  }

  function bossBehaviors(dt){
    for(const e of state.enemies){
      if(e.regen){ e.hp = Math.min(e.maxHp, e.hp + e.regen * dt); }
      if(e.enragedAt && e.hp < e.maxHp * e.enragedAt){ e.speed = Math.max(e.speed, e.boss ? 32 : 24); }
      if(e.rage && e.hp < e.maxHp * 0.5){ e.speed = Math.max(e.speed, 28); }
      if(e.towerSlowAura){ for(const t of state.turrets){ if(Math.hypot(t.x-e.x, t.y-e.y) < 96){ t.cooldown += dt * e.towerSlowAura; } } }
      if(e.chillAura){ for(const t of state.turrets){ if(Math.hypot(t.x-e.x, t.y-e.y) < 105){ t.cooldown += dt * 0.2; } } }
      if(e.summonEvery){ e.summonTimer -= dt; if(e.summonTimer <= 0){ e.summonTimer = e.summonEvery; const id = Math.floor(Math.random() * Math.min(MONSTERS.length, 20 + state.wave)); spawnEnemyFromTemplate(MONSTERS[id], false); } }
    }
  }

  function enemyRanged(dt, e){
    if(!e.ranged) return;
    e.spitCooldown -= dt; if(e.spitCooldown > 0) return;
    let target = null, best = 999999;
    for(const t of state.turrets){ const d = Math.hypot(t.x-e.x, t.y-e.y); if(d < e.spitRange && d < best){ target = t; best = d; } }
    if(!target) return;
    e.spitCooldown = e.spitRate;
    state.effects.push({type:'spit', x1:e.x, y1:e.y, x2:target.x, y2:target.y, life:0.14});
    target.hp -= e.spitDamage * (e.boss ? 1.35 : 1);
    if(e.curseRate) target.cooldown += e.curseRate;
    if(target.hp <= 0){
      const idx = state.turrets.findIndex(v => v.id === target.id); if(idx >= 0) state.turrets.splice(idx,1);
      if(state.selectedTurretId === target.id){ state.selectedTurretId = null; refreshActionBar(); }
      state.effects.push({type:'boom', x:target.x, y:target.y, r:18, life:0.18});
    }
  }

  function placeDeathPool(e){ if(e.deathPoison){ state.pools.push({x:e.x, y:e.y, r:42 + (e.boss ? 12 : 0), dps:e.deathPoison, life:2.8, color:'rgba(120,255,160,0.16)'}); } }

  function splitEnemy(e){
    if(!e.split) return;
    const spawns = Math.min(2, e.split);
    for(let i=0;i<spawns;i++){
      const template = MONSTERS.find(m => m.family === 'runner') || MONSTERS[0];
      const child = { ...template, baseHp: Math.max(12, template.baseHp - 6), hpInc: template.hpInc, speed: template.speed + 8, speedInc: template.speedInc, reward: Math.max(1, Math.floor(e.reward * 0.25)), size: Math.max(10, e.size * 0.65), color:e.accent || template.color };
      spawnEnemyFromTemplate(child, false);
      const ne = state.enemies[state.enemies.length - 1]; if(ne){ ne.x = e.x + (i===0?-8:8); ne.y = e.y - 4; ne.col = e.col; }
    }
  }


function damageBase(rawDamage, col){
  let damage = rawDamage;
  const maxEnergy = energyMaxValue();
  if(hasPassive('barrier_valve') && state.energy >= maxEnergy * 0.75) damage *= 0.75;
  damage = Math.max(1, damage - baseDamageFlatReduction());
  if(hasPassive('emergency_bulkhead') && !state.emergencyUsed && state.energy - damage <= 0){
    state.emergencyUsed = true;
    state.energy = 15;
    showBanner('EMERGENCY BULKHEAD', 1.5);
  } else {
    state.energy -= damage;
  }
  state.energyLossBank += damage;
  if(hasPassive('revenge_core')){
    while(state.energyLossBank >= 12){
      state.energyLossBank -= 12;
      addDamageBuff(1.22, 8, 'REVENGE CORE');
    }
  }
  if(hasPassive('shock_fence')){
    let hits = 0;
    for(const e of state.enemies){
      if(e.y < state.field.baseY - state.field.tileH * 2.2) continue;
      if(Math.abs(e.col - col) > 1) continue;
      applyDamage(e, 28, {slow:0.88, slowTime:0.4});
      hits += 1;
      if(hits >= 3) break;
    }
    if(hits) state.effects.push({type:'boom', x: state.field.left + (col + 0.5) * state.field.tileW, y: state.field.baseY - 10, r:20, life:0.16});
  }
  if(hasPassive('frost_fence')){
    for(const e of state.enemies){
      if(e.y < state.field.baseY - state.field.tileH * 2.0) continue;
      if(Math.abs(e.col - col) > 1) continue;
      e.slow = Math.min(e.slow, 0.55);
      e.slowTime = Math.max(e.slowTime, 2.0);
    }
    state.effects.push({type:'frost', x: state.field.left + (col + 0.5) * state.field.tileW, y: state.field.baseY - 8, r:26, life:0.22});
  }
  clampEnergy();
  updateHud();
  if(state.energy <= 0){ state.energy = 0; state.over = true; showBanner('ENERGY ZERO - 리셋으로 다시 시작', 4); }
}

function onEnemyKilled(e){
  state.gold += e.reward + Math.floor(state.wave * 0.35);
  if(e.boss) state.gold += 40 + state.wave * 4;
  state.kills += 1;
  if(hasPassive('kill_patch') && state.kills % 8 === 0) healEnergy(2);
  if(hasPassive('vamp_core') && state.kills % 15 === 0) healEnergy(5);
  if(e.boss && hasPassive('titan_reserve')){ healEnergy(10); addDamageBuff(1.15, 8, 'TITAN RESERVE'); }
  updateHud();
}

  function update(dt){
    state.animClock += dt;
    if(!state.started || state.paused || state.over) return;
    if(state.spawnQueue.length === 0 && state.enemies.length === 0){ state.betweenWaves -= dt; if(state.betweenWaves <= 0){ spawnWave(); state.betweenWaves = state.wave % 10 === 0 ? 3.1 : 2.5; } }
    if(state.spawnQueue.length > 0){ state.spawnTimer -= dt; if(state.spawnTimer <= 0){ spawnNext(); state.spawnTimer = currentSpawnInterval(); } }
    for(const t of state.turrets){ fireTurret(t, dt); }
    bossBehaviors(dt);

    for(let i=state.bullets.length-1;i>=0;i--){
      const b = state.bullets[i]; b.life -= dt; b.x += b.vx * dt; b.y += b.vy * dt;
      if(Math.random() < 0.72){ state.effects.push({type:'trail', x:b.x, y:b.y, r:b.splash > 0 ? 4.6 : 2.6, life:0.05, color:b.color}); }
      let hit = null;
      for(const e of state.enemies){ if(Math.hypot(e.x - b.x, e.y - b.y) < e.size * 0.55 + 4){ hit = e; break; } }
      if(hit){
        applyDamage(hit, b.damage, {poison:b.poison, slow:b.slow, slowTime:b.slowTime});
        if(b.splash > 0){ for(const e of state.enemies){ if(e.id !== hit.id && Math.hypot(e.x - hit.x, e.y - hit.y) <= b.splash){ applyDamage(e, Math.round(b.damage * 0.58), {poison:b.poison ? b.poison * 0.5 : 0}); } } }
        state.effects.push({type:'impactFlash', x:b.x, y:b.y, r:b.splash > 0 ? Math.max(18,b.splash * 0.42) : 13, life:0.12, color:b.color});
        state.effects.push({type:'boom', x:b.x, y:b.y, r:b.splash > 0 ? Math.max(14,b.splash * 0.38) : 12, life:0.18, color:b.color});
        state.bullets.splice(i,1); continue;
      }
      if(b.life <= 0 || b.y < state.field.top - 40 || b.y > state.field.baseY + 30){ state.bullets.splice(i,1); }
    }

    for(let i=state.pools.length-1;i>=0;i--){
      const p = state.pools[i]; p.life -= dt;
      for(const e of state.enemies){ if(Math.hypot(e.x - p.x, e.y - p.y) <= p.r){ applyDamage(e, p.dps * dt, {}); } }
      if(p.life <= 0) state.pools.splice(i,1);
    }

    for(let i=state.enemies.length-1;i>=0;i--){
      const e = state.enemies[i];
      if(e.poisonTime > 0){ e.poisonTime -= dt; if(e.poison > 0) e.hp -= e.poison * dt; }
      if(e.slowTime > 0){ e.slowTime -= dt; } else { e.slow = 1; }
      enemyRanged(dt, e);
      e.walkClock += dt * Math.max(1.2, e.speed * 0.045);

      let blocked = false;
      for(const t of state.turrets){
        if((t.family === 'wall' || t.family === 'bunker') && t.col === e.col){
          if(e.y + e.size * 0.4 >= t.y - state.field.tileH * 0.35 && e.y < t.y + state.field.tileH * 0.24){
            blocked = true; t.hp -= (e.baseDamage * (e.smash ? 1.35 : 1)) * dt * 5.2;
            if(t.hp <= 0){ const idx = state.turrets.findIndex(v => v.id === t.id); if(idx >= 0) state.turrets.splice(idx,1); if(state.selectedTurretId === t.id){ state.selectedTurretId = null; refreshActionBar(); } state.effects.push({type:'boom', x:t.x, y:t.y, r:22, life:0.2}); }
            break;
          }
        }
      }
      if(!blocked){ e.y += e.speed * (e.slow || 1) * dt; } else { e.walkClock += dt * 1.2; }

      if(e.hp <= 0){
        onEnemyKilled(e); placeDeathPool(e); if(e.deathBurst) splashDamage(e.x, e.y, 34, e.deathBurst, {}); splitEnemy(e);
        state.effects.push({type:'boom', x:e.x, y:e.y, r:e.boss ? 30 : 20, life:0.22}); state.enemies.splice(i,1); continue;
      }
      if(e.y >= state.field.baseY){
        placeDeathPool(e); if(e.deathBurst) state.effects.push({type:'boom', x:e.x, y:state.field.baseY, r:22, life:0.18});
        state.effects.push({type:'baseGridFlash', col:e.col, life:0.30});
        damageBase(e.baseDamage + (e.boss ? 3 : 0), e.col);
        state.enemies.splice(i,1);
      }
    }

    for(let i=state.effects.length-1;i>=0;i--){ state.effects[i].life -= dt; if(state.effects[i].life <= 0) state.effects.splice(i,1); }
    refreshActionBar(); if(state.bannerUntil && state.bannerUntil < performance.now()/1000){ hideBanner(); state.bannerUntil = 0; }
  }

  function drawField(){
    const f = state.field; ctx.fillStyle = '#121a25'; ctx.fillRect(0,0,fieldWrap.clientWidth,fieldWrap.clientHeight);
    const g = ctx.createLinearGradient(0, f.top, 0, f.top + f.height); g.addColorStop(0,'#182332'); g.addColorStop(1,'#101720'); ctx.fillStyle = g; ctx.fillRect(f.left, f.top, f.width, f.height);
    for(let r=0;r<f.rows;r++){
      for(let c=0;c<f.cols;c++){
        const x = f.left + c * f.tileW; const y = f.top + r * f.tileH;
        ctx.fillStyle = (r+c)%2===0 ? 'rgba(255,255,255,.028)' : 'rgba(0,0,0,.05)'; ctx.fillRect(x + 1, y + 1, f.tileW - 2, f.tileH - 2);
        ctx.strokeStyle = 'rgba(122,146,182,.16)'; ctx.strokeRect(x + 1.5, y + 1.5, f.tileW - 3, f.tileH - 3);
      }
    }
    ctx.save();
    ctx.fillStyle = '#d7ecff';
    ctx.font = 'bold 13px sans-serif';
    ctx.shadowColor = 'rgba(130,210,255,.55)';
    ctx.shadowBlur = 7;
    ctx.fillText('ENTRY', f.left + 8, Math.max(18, f.top - 10));
    ctx.restore();
    const gaugeY = Math.min(fieldWrap.clientHeight - 26, f.baseY + 22);
    const gaugeBg = ctx.createLinearGradient(f.left, gaugeY, f.left + f.width, gaugeY);
    gaugeBg.addColorStop(0, '#2e0a12');
    gaugeBg.addColorStop(0.5, '#4f101d');
    gaugeBg.addColorStop(1, '#24070d');
    ctx.fillStyle = gaugeBg;
    ctx.fillRect(f.left, gaugeY, f.width, 9);
    const energyWidth = f.width * Math.max(0, state.energy / energyMaxValue());
    if(energyWidth > 0){
      const gaugeFill = ctx.createLinearGradient(f.left, gaugeY, f.left + energyWidth, gaugeY);
      gaugeFill.addColorStop(0.00, '#fff3f6');
      gaugeFill.addColorStop(0.18, '#ffb4c1');
      gaugeFill.addColorStop(0.55, '#ff566f');
      gaugeFill.addColorStop(1.00, '#b70f2f');
      ctx.fillStyle = gaugeFill;
      ctx.fillRect(f.left, gaugeY, energyWidth, 9);
      ctx.fillStyle = 'rgba(255,255,255,.28)';
      ctx.fillRect(f.left, gaugeY, energyWidth, 2);
    }
    ctx.fillStyle = '#ffd0d6'; ctx.fillText('BASE ENERGY', f.left + 8, gaugeY + 21);
  }

  function shapeCtx(c, x,y,w,h,color){ c.save(); c.translate(x,y); c.fillStyle = color; c.strokeStyle = 'rgba(255,255,255,.18)'; c.lineWidth = Math.max(1, Math.min(w,h)*0.05); }
  function endShape(c){ c.restore(); }
  function barrel(c,x,y,w,h){ c.fillRect(x,y,w,h); }
  function dome(c,x,y,r){ c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fill(); }
  function poly(c,pts){ c.beginPath(); c.moveTo(pts[0][0],pts[0][1]); for(let i=1;i<pts.length;i++) c.lineTo(pts[i][0],pts[i][1]); c.closePath(); c.fill(); }

  function drawInstallModel(c, item, cx, cy, w, h, level=1, isCard=false){

    const W = w, H = h;
    const basePlate = () => { c.fillStyle = '#253242'; c.fillRect(-W*0.32, H*0.12, W*0.64, H*0.13); c.fillStyle = accent; };
    switch(item.model){
      case 'rifle': basePlate(); c.fillRect(-W*0.10,-H*0.02,W*0.20,H*0.24); c.fillStyle=steel; barrel(c,W*0.02,-H*0.10,W*0.26,H*0.08); break;
      case 'smg': basePlate(); dome(c,0,H*0.02,W*0.13); c.fillStyle=steel; barrel(c,-W*0.15,-H*0.04,W*0.14,H*0.06); barrel(c,W*0.01,-H*0.04,W*0.14,H*0.06); break;
      case 'burst': basePlate(); c.fillRect(-W*0.12,-H*0.02,W*0.24,H*0.18); c.fillStyle=steel; for(let i=-1;i<=1;i++) barrel(c,i*W*0.11,-H*0.10,W*0.08,H*0.08); break;
      case 'sniper': basePlate(); c.fillRect(-W*0.07,-H*0.03,W*0.14,H*0.18); c.fillStyle=steel; barrel(c,0,-H*0.10,W*0.33,H*0.06); c.fillStyle='#202b38'; c.fillRect(W*0.06,-H*0.16,W*0.13,H*0.05); break;

  function drawBullets(){
    for(const b of state.bullets){
      const r = b.splash ? 1.7 : 0.82;
      const a = Math.max(0.18, b.life / 1.2);

      const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, glowR);
      g.addColorStop(0, 'rgba(255,255,255,' + (0.52 * a).toFixed(3) + ')');
      g.addColorStop(0.24, b.color || 'rgba(255,210,160,.62)');

      ctx.save();
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(b.x, b.y, glowR, 0, Math.PI*2); ctx.fill();
      ctx.shadowColor = b.color;

      else if(e.type === 'heal'){ ctx.strokeStyle = 'rgba(190,255,210,.9)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(e.x, e.y, 18 * (1 - e.life / 0.24 + 0.2), 0, Math.PI*2); ctx.stroke(); }
      else if(e.type === 'coin'){ ctx.fillStyle = 'rgba(255,220,100,' + Math.max(0, e.life / 0.5) + ')'; ctx.font = 'bold 12px sans-serif'; ctx.fillText('+$', e.x - 8, e.y - (1 - e.life / 0.5) * 12); }
      else if(e.type === 'shield'){ ctx.strokeStyle = 'rgba(120,170,255,.85)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(e.x, e.y, 16 * (1 - e.life / 0.14 + 0.2), 0, Math.PI*2); ctx.stroke(); }
      else if(e.type === 'muzzle'){
        const a = Math.max(0, e.life / 0.10);
        const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r * (1.18 + a * 0.55));
        g.addColorStop(0, 'rgba(255,255,255,' + (0.95 * a).toFixed(3) + ')');
        g.addColorStop(0.28, e.color || 'rgba(255,220,180,.88)');
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (1.18 + a * 0.55), 0, Math.PI*2); ctx.fill();
      }
      else if(e.type === 'trail'){
        const a = Math.max(0, e.life / 0.07);
        const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r * (0.95 + a * 0.35));
        g.addColorStop(0, 'rgba(255,255,255,' + (0.60 * a).toFixed(3) + ')');
        g.addColorStop(0.3, e.color || 'rgba(255,200,140,.5)');
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (0.95 + a * 0.35), 0, Math.PI*2); ctx.fill();
      }
      else if(e.type === 'impactFlash'){
        const a = Math.max(0, e.life / 0.12);
        const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r * (0.82 + a * 0.42));
        g.addColorStop(0, 'rgba(255,255,255,' + (0.94 * a).toFixed(3) + ')');
        g.addColorStop(0.20, e.color || 'rgba(255,185,120,.88)');
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (0.82 + a * 0.42), 0, Math.PI*2); ctx.fill();
      }
      else if(e.type === 'baseGridFlash'){
        const a = Math.max(0, e.life / 0.30);
        const f = state.field;
        const cols = [Math.max(0, e.col - 1), e.col, Math.min(f.cols - 1, e.col + 1)].filter((v, i, arr) => arr.indexOf(v) === i);
        const rows = [Math.max(0, f.rows - 2), f.rows - 1];
        ctx.save();
        ctx.shadowColor = 'rgba(255,255,255,' + (0.95 * a).toFixed(3) + ')';
        ctx.shadowBlur = 8 + 22 * a;
        for(const col of cols){
          for(const row of rows){
            const x = f.left + col * f.tileW + 2;
            const y = f.top + row * f.tileH + 2;
            const w = f.tileW - 4;
            const h = f.tileH - 4;
            const weight = (col === e.col && row === f.rows - 1) ? 1 : (col === e.col ? 0.78 : 0.52);
            ctx.fillStyle = 'rgba(255,255,255,' + (0.14 * a * weight).toFixed(3) + ')';
            ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = 'rgba(255,255,255,' + (0.88 * a * weight).toFixed(3) + ')';
            ctx.lineWidth = 1.6 + 2.2 * a * weight;
            ctx.strokeRect(x, y, w, h);
          }
        }
        ctx.restore();
      }
      else if(e.type === 'place'){ ctx.strokeStyle = e.color || 'rgba(120,255,160,.85)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(e.x, e.y, 10 + (1 - e.life / 0.2) * 12, 0, Math.PI*2); ctx.stroke(); }
      else if(e.type === 'phase'){ ctx.strokeStyle = 'rgba(224,224,255,.9)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(e.x, e.y, 8 + (1 - e.life / 0.12) * 10, 0, Math.PI*2); ctx.stroke(); }
    }
  }

  function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); drawField(); drawPools(); drawTurrets(); drawEnemies(); drawBullets(); drawEffects(); }

  function onPointer(ev){ ev.preventDefault(); const p = pointerPos(ev); const tile = tileAt(p.x,p.y); if(!tile) return; place(tile.col,tile.row); }
  function loop(ts){ const now = ts / 1000; const dt = Math.min(0.033, state.last ? now - state.last : 0.016); state.last = now; update(dt); draw(); requestAnimationFrame(loop); }

  canvas.addEventListener('mousedown', onPointer);
  canvas.addEventListener('touchstart', onPointer, {passive:false});
  for(const btn of document.querySelectorAll('button')){
    btn.addEventListener('pointerdown', ev => flashButton(btn, ev));
  }
  startBtn.addEventListener('click', startGame);
  pauseBtn.addEventListener('click', () => { state.paused = !state.paused; pauseBtn.textContent = state.paused ? '재개' : '정지'; showBanner(state.paused ? '일시정지' : '재개'); });
  resetBtn.addEventListener('click', resetGame);
  upgradeBtn.addEventListener('click', upgradeSelected);
  sellBtn.addEventListener('click', sellSelected);
  modeInstallBtn.addEventListener('click', () => changeMode('install'));
  modePassiveBtn.addEventListener('click', () => changeMode('passive'));
  sliderWrap.addEventListener('scroll', () => { const page = Math.round(sliderWrap.scrollLeft / Math.max(1, sliderWrap.clientWidth)); if(page !== state.page){ state.page = Math.max(0, Math.min(pageCount()-1, page)); syncPageUI(); } }, {passive:true});
  window.addEventListener('resize', () => { resize(); sliderWrap.scrollLeft = sliderWrap.clientWidth * state.page; });

  resetGame(); resize(); requestAnimationFrame(loop);
})();
</script>
</body>
