<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="refresh" content="0; url=./index3.html?v=2026-04-29-08">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    (function(){
      const target = new URL("./index3.html", location.href);
      target.searchParams.set("v", "2026-04-29-08");
      const srcParams = new URLSearchParams(location.search || "");
      for(const [k, v] of srcParams.entries()){
        if(k === "v") continue;
        target.searchParams.set(k, v);
      }
      if(location.hash) target.hash = location.hash;
      location.replace(target.toString());
    })();
  </script>
</head>
<body></body>
</html>
